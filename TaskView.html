<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Technology – Kalender</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  db.settings({ experimentalForceLongPolling: true, experimentalAutoDetectLongPolling: false, useFetchStreams: false, merge: true });

<style>
:root {
  --bg: #f5f6fa;
  --bg2: #ffffff;
  --text: #1a1d2e;
  --text2: #64748b;
  --text3: #94a3b8;
  --border: #e2e8f0;
  --accent: #4f6ef7;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --col-w: calc(100% / 5);
}
@media(prefers-color-scheme:dark){
  :root {
    --bg: #0f1117; --bg2: #1a1d2e; --text: #e8eaf0;
    --text2: #94a3b8; --text3: #64748b; --border: #2a2d3e;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(20px + var(--safe-bottom));
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2);
  padding: calc(8px + var(--safe-top)) 12px 0;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  margin-bottom: 8px;
}
.logo {
  height: 40px; width: auto; flex-shrink: 0;
}
.header h1 { font-size: 22px; font-weight: 700; flex: 1; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  background: var(--text3); transition: background .3s;
}
.status-dot.connected { background: var(--green); }
.status-dot.error { background: var(--red); }
.btn-icon {
  background: none; border: none; font-size: 22px; cursor: pointer;
  color: var(--text2); padding: 4px; border-radius: 8px;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon:active { background: var(--border); }

/* ── Week Nav ── */
.week-nav {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  margin-bottom: 8px;
}
.week-nav .btn-icon { font-size: 22px; min-width: 32px; min-height: 32px; }
.kw-label { font-size: 19px; font-weight: 700; color: var(--accent); min-width: 60px; text-align: center; }
.kw-dates { font-size: 13px; color: var(--text2); text-align: center; }
.btn-today {
  font-size: 13px; font-weight: 600; padding: 4px 10px;
  border-radius: 14px; border: 1px solid var(--accent);
  background: none; color: var(--accent); cursor: pointer; min-height: 28px;
}
.btn-today:active { background: var(--accent); color: #fff; }
.btn-today.hidden { visibility: hidden; }

/* ── Day Header Grid ── */
.day-header-row {
  display: flex; align-items: stretch;
  border-top: 1px solid var(--border);
}
.day-hdr-cell {
  flex: 1; text-align: center; padding: 6px 0 4px;
  border-left: 2px solid var(--text3);
  font-size: 13px; line-height: 1.3;
}
.day-hdr-cell:first-child { border-left: none; }
.day-hdr-cell .dn { font-weight: 700; text-transform: uppercase; color: var(--text2); }
.day-hdr-cell .dd { font-size: 14px; font-weight: 600; color: var(--text); }
.day-hdr-cell.today { background: var(--accent); }
.day-hdr-cell.today .dn, .day-hdr-cell.today .dd { color: #fff; }
.day-hdr-cell.weekend .dn, .day-hdr-cell.weekend .dd { color: var(--text3); }
.day-hdr-cell.holiday { background: rgba(239,68,68,.10); }
.day-hdr-cell.holiday .dn, .day-hdr-cell.holiday .dd { color: var(--red); }
.day-hdr-cell.holiday .hol-name { font-size: 10px; color: var(--red); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }
.day-cell.holiday-col { background: rgba(239,68,68,.05); }

/* ── Gantt Rows ── */
.gantt-body { padding-bottom: 40px; }
.gantt-group {
  border-bottom: 3px solid var(--border); cursor: pointer;
}
.gantt-group:active { background: rgba(79,110,247,.04); }
.gantt-label-row {
  padding: 6px 8px 2px; font-size: 14px; font-weight: 600;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gantt-label-row.child-label { padding-left: 20px; font-size: 13px; font-weight: 500; }
.gantt-row {
  display: flex; position: relative;
  min-height: 26px;
}
.gantt-row.child-row .task-bar { opacity: .75; }
.day-cells {
  flex: 1; display: flex; position: relative;
  overflow: visible;
}
.day-cell {
  flex: 1; border-left: 2px solid var(--text3);
  min-height: 100%;
}
.day-cell:first-child { border-left: none; }
.day-cell.today-col { background: rgba(79,110,247,.06); }
.day-cell.weekend-col { background: rgba(0,0,0,.02); }
@media(prefers-color-scheme:dark){
  .day-cell.today-col { background: rgba(79,110,247,.1); }
  .day-cell.weekend-col { background: rgba(255,255,255,.02); }
}

/* ── Task Bar with label inside ── */
.task-bar {
  position: absolute; top: 2px; bottom: 2px;
  border-radius: 4px; min-width: 6px;
  z-index: 2; display: flex; align-items: center;
  overflow: hidden;
}
.task-bar.done-bar { opacity: .4; }
.bar-time {
  position: relative; z-index: 3; color: #fff; font-size: 10px;
  font-weight: 600; padding: 0 4px; white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,.3);
  overflow: hidden; text-overflow: ellipsis;
}
.bar-bg {
  position: absolute; inset: 0; border-radius: 4px;
  overflow: hidden;
}
.bar-progress {
  height: 100%; border-radius: 4px;
  background: rgba(255,255,255,.25);
}
.milestone-diamond {
  position: absolute; top: 50%; width: 10px; height: 10px;
  background: var(--amber); transform: translate(-50%, -50%) rotate(45deg);
  z-index: 3; border: 1px solid rgba(0,0,0,.15);
}
/* Extra period bar (no label) */
.task-bar-extra {
  position: absolute; top: 2px; bottom: 2px;
  border-radius: 4px; min-width: 6px;
  z-index: 1; opacity: .45;
}

/* ── Section Headers ── */
.section-row {
  display: flex; align-items: center;
  background: var(--bg); padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text3); gap: 6px;
  position: sticky; top: 0; z-index: 5;
}
.section-icon { font-size: 16px; }
.section-count {
  background: var(--border); border-radius: 8px; padding: 1px 6px;
  font-size: 12px;
}
/* ── Shared utility classes ── */
.fab-menu-btn {
  display: flex; align-items: center; gap: 8px; padding: 10px 16px;
  border-radius: 12px; border: none; color: #fff; font-size: 16px;
  font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.2);
  font-family: inherit;
}
.badge-meeting {
  font-size: 12px; font-weight: 600; background: #8b5cf6; color: #fff;
  border-radius: 4px; padding: 2px 6px; white-space: nowrap;
}
.modal-heading { display: flex; align-items: center; gap: 8px; }
.field-row { display: flex; gap: 8px; }
.field-half { flex: 1; }
.empty-message { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 16px; }
.error-message { color: var(--red); font-size: 17px; text-align: center; padding: 20px; }
.btn-retry {
  margin-top: 12px; padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--red); background: none; color: var(--red); cursor: pointer;
}

/* ── Detail Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
  align-items: flex-start; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg2); border-radius: 0 0 20px 20px;
  width: 100%; max-width: 500px; max-height: 85dvh;
  padding: 16px 20px calc(16px + var(--safe-bottom));
  overflow-y: auto; animation: slideDown .25s ease;
}
@media(max-width:600px){
  .modal, .add-modal {
    max-width: 100%; max-height: 100dvh; border-radius: 0; height: 100dvh;
  }
}
@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px; background: var(--border);
  margin: 0 auto 14px;
}
.modal h2 { font-size: 20px; margin-bottom: 10px; line-height: 1.3; }
.modal-row {
  display: flex; justify-content: space-between; padding: 7px 0;
  border-bottom: 1px solid var(--border); font-size: 16px;
}
.modal-row:last-child { border-bottom: none; }
.modal-label { color: var(--text2); }
.modal-val { font-weight: 500; text-align: right; }
.modal-progress { margin-top: 10px; }
.modal-progress-bar {
  height: 6px; background: var(--border); border-radius: 3px;
  overflow: hidden; margin-top: 4px;
}
.modal-progress-fill { height: 100%; border-radius: 3px; }
.badge {
  font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 4px; white-space: nowrap;
}
.badge.overdue { background: #fef2f2; color: var(--red); }
.badge.active { background: #eff6ff; color: var(--accent); }
.badge.done { background: #f0fdf4; color: var(--green); }
.badge.planned { background: #f8fafc; color: var(--text3); }
@media(prefers-color-scheme:dark){
  .badge.overdue { background: #3b1419; }
  .badge.active { background: #1a2240; }
  .badge.done { background: #132a1a; }
  .badge.planned { background: #1e2030; }
}
/* ── Delete Button in Detail Modal ── */
.btn-delete {
  display: block; width: 100%; margin-top: 16px; padding: 12px;
  background: none; border: 1.5px solid var(--red); border-radius: 8px;
  color: var(--red); font-size: 17px; font-weight: 600; cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  transition: background .15s, color .15s;
}
.btn-delete:hover { background: var(--red); color: #fff; }
.btn-delete:active { background: #dc2626; color: #fff; }
/* ── Confirm Modal ── */
#confirmModalBg {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#confirmModalBg.open { display: flex; }
.confirm-modal {
  background: var(--bg2); border-radius: 16px;
  width: 92%; max-width: 360px; padding: 24px 20px;
  text-align: center; animation: fadeIn .15s ease;
  box-shadow: 0 16px 48px rgba(0,0,0,.25);
}
@keyframes fadeIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
.confirm-modal h3 { font-size: 19px; margin-bottom: 6px; }
.confirm-modal p { font-size: 16px; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }
.confirm-actions { display: flex; gap: 8px; }
.confirm-actions button {
  flex: 1; padding: 12px; border: none; border-radius: 8px;
  font-size: 17px; font-weight: 600; cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 44px;
}
.btn-confirm-del { background: var(--red); color: #fff; }
.btn-confirm-del:active { background: #dc2626; }
.btn-confirm-cancel { background: var(--border); color: var(--text); }
.btn-confirm-cancel:active { background: #cbd5e1; }

/* ── To-Do Section in Detail Modal ── */
.todo-section { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1.5px solid var(--border); }
.todo-section h3 { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
.todo-list { display: flex; flex-direction: column; gap: 6px; }
.todo-item { display: flex; gap: 6px; align-items: center; }
.todo-num { width: 28px; flex-shrink: 0; font-size: 15px; font-weight: 700; color: var(--text3); text-align: center; line-height: 48px; }
.todo-item textarea { flex: 1; min-width: 0; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 17px; min-height: 48px; background: var(--bg2); color: var(--text); resize: none; overflow: hidden; font-family: inherit; line-height: 1.4; field-sizing: content; }
.todo-item input:focus, .todo-item textarea:focus { border-color: var(--accent); outline: none; }
.todo-del { width: 32px; height: 32px; flex-shrink: 0; border: none; background: none; color: var(--red); font-size: 18px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.todo-del:active { background: rgba(239,68,68,.1); }
.todo-add { width: 100%; margin-top: 8px; padding: 10px; border: 1.5px dashed var(--border); border-radius: 8px; background: none; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; }
.todo-add:active { background: rgba(79,110,247,.06); }
.visibility-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.vis-chip { padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; background: none; color: var(--text2); transition: all .15s; }
.vis-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.vis-chip:active { opacity: .7; }
.todo-dot { position: absolute; top: 0; left: 2px; bottom: 0; z-index: 4; display: flex; align-items: center; font-size: 14px; line-height: 1; color: var(--red); filter: drop-shadow(0 0 1px rgba(0,0,0,.3)); }
@media(max-width:600px){
  .todo-num { width: 24px; font-size: 14px; }
  .todo-item textarea { font-size: 16px; }
}

/* ── FAB (Floating Action Button) ── */
.fab {
  position: fixed; bottom: calc(24px + var(--safe-bottom)); right: 20px;
  width: 52px; height: 52px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; font-size: 34px; line-height: 1;
  cursor: pointer; box-shadow: 0 4px 16px rgba(79,110,247,.4);
  z-index: 50; display: flex; align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
.fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(79,110,247,.5); }
.fab:active { transform: scale(.95); }

/* ── Add-Task Modal ── */
#addModalBg {
  display: none; position: fixed; inset: 0; z-index: 210;
  background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
  align-items: flex-start; justify-content: center;
}
#addModalBg.open { display: flex; }
.add-modal {
  background: var(--bg2); border-radius: 0 0 20px 20px;
  width: 100%; max-width: 500px; max-height: 85dvh;
  padding: 16px 20px calc(16px + var(--safe-bottom));
  overflow-y: auto; animation: slideDown .25s ease;
}
.add-modal h2 { font-size: 20px; margin-bottom: 14px; }
.add-field { margin-bottom: 14px; }
.add-field label { display: block; font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.add-field input, .add-field select {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 19px; outline: none; background: var(--bg);
  color: var(--text); transition: border .15s; min-height: 48px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  -webkit-appearance: none; appearance: none;
}
.add-field input:focus, .add-field select:focus { border-color: var(--accent); }
.add-actions { display: flex; gap: 10px; margin-top: 20px; }
.add-actions button {
  flex: 1; padding: 14px; border: none; border-radius: 10px;
  font-size: 18px; font-weight: 600; cursor: pointer; min-height: 48px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.btn-save { background: var(--accent); color: #fff; }
.btn-save:hover { background: #3b5de7; }
.btn-save:active { background: #3b5de7; }
.btn-cancel { background: var(--border); color: var(--text); }
.btn-cancel:hover { background: #cbd5e1; }
.btn-cancel:active { background: #cbd5e1; }
.add-error { color: var(--red); font-size: 14px; margin-top: 6px; display: none; }

/* ── Loading ── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; color: var(--text2);
}
.loader {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Login Overlay ── */
#login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #1a1d2e 0%, #2d3150 100%);
  display: flex; align-items: center; justify-content: center;
}
#login-box {
  background: #fff; border-radius: 16px; padding: 40px 44px;
  width: 360px; max-width: 92vw;
  box-shadow: 0 24px 80px rgba(0,0,0,.5); text-align: center;
}
#login-box h2 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
#login-box p { font-size: 16px; color: var(--text2); margin-bottom: 28px; }
#login-box input {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 17px; outline: none;
  transition: border .15s; margin-bottom: 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
#login-box input:focus { border-color: var(--accent); }
#login-box button {
  width: 100%; padding: 11px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 17px; font-weight: 600;
  cursor: pointer; transition: background .15s;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
#login-box button:hover { background: #3b5de7; }
#login-err { color: #ef4444; font-size: 14px; margin-top: -6px; margin-bottom: 10px; min-height: 16px; }
#login-logo { width: 132px; height: auto; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }

/* ── Responsive ── */
@media(max-width:380px){
  #login-box { padding: 28px 24px; }
  #login-logo img { width: 90px !important; }
  #login-box h2 { font-size: 22px !important; }
}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" style="display:none">

<!-- FAB Button + Menu -->
<div id="fabMenu" style="display:none;position:fixed;bottom:calc(84px + var(--safe-bottom));right:20px;z-index:51;flex-direction:column;gap:8px;align-items:flex-end">
  <button onclick="closeFabMenu();openAddTask()" class="fab-menu-btn" style="background:var(--accent)">Neue Aufgabe</button>
</div>
<button class="fab" id="addTaskBtn" onclick="toggleFabMenu()" title="Neu erstellen">+</button>
<script>
function toggleFabMenu(){
  var m=document.getElementById('fabMenu');
  if(m.style.display==='flex'){closeFabMenu();}
  else{m.style.display='flex';}
}
function closeFabMenu(){document.getElementById('fabMenu').style.display='none';}
document.addEventListener('click',function(e){
  var fab=document.getElementById('addTaskBtn');
  var menu=document.getElementById('fabMenu');
  if(!fab.contains(e.target)&&!menu.contains(e.target))closeFabMenu();
});
</script>

<!-- Add-Task Modal -->
<div id="addModalBg" onclick="if(event.target===this)closeAddModal()">
  <div class="add-modal">
    <div class="modal-handle"></div>
    <h2>Neue Aufgabe</h2>
    <div class="add-field">
      <label>Name</label>
      <input type="text" id="addName" placeholder="Aufgabenname eingeben">
    </div>
    <div class="add-field">
      <label>Übergeordnete Aufgabe</label>
      <select id="addParent"></select>
    </div>
    <div class="add-field">
      <label>Beginn</label>
      <input type="date" id="addStart">
    </div>
    <div class="add-field">
      <label>Ende</label>
      <input type="date" id="addEnd">
    </div>
    <div id="addVisibility"></div>
    <div class="add-error" id="addError"></div>
    <div class="add-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveNewTask()">Erstellen</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div class="modal-handle"></div><div id="modalContent"></div></div>
</div>

<!-- Confirm Delete Modal -->
<div id="confirmModalBg" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-modal">
    <h3>Aufgabe löschen?</h3>
    <p id="confirmText"></p>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Abbrechen</button>
      <button class="btn-confirm-del" onclick="if(_deleteMeetingId){confirmDeleteMeeting();}else{confirmDelete();}">Löschen</button>
    </div>
  </div>
</div>

<script>
var tasks = [];
var outlookEvents = [];
var OUTLOOK_COL = db.collection('outlook_events');
var _unsubGantt = null;
var _unsubOutlook = null;
var MEETING_API = 'https://firestore.googleapis.com/v1/projects/project-dachau/databases/(default)/documents/outlook_events/';
var MEETING_KEY = '?key=AIzaSyAR9TGY3oz3bhO5nl6zgwnVHcS_IDmk5T0';
function meetingUrl(docId){ return MEETING_API+encodeURIComponent(docId)+MEETING_KEY; }
var taskTodos = {};
var today = new Date();
var todayStr = today.toISOString().slice(0,10);
var currentMonday = getMonday(today);
var DN = ['MO','DI','MI','DO','FR','SA','SO'];
var MN = ['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function getMonday(d) {
  var dt = new Date(d); var day = dt.getDay();
  dt.setDate(dt.getDate() + ((day===0?-6:1)-day));
  dt.setHours(0,0,0,0); return dt;
}
function getISOWeek(d) {
  var dt = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var dayNum = dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-dayNum);
  var ys = new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-ys)/86400000)+1)/7);
}
function pad(n){ return n<10?'0'+n:''+n; }
function toStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function addDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d){
  if(!d) return '';
  if(typeof d==='string'){ var p=d.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
  return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
}
function fmtDateShort(d){ return d.getDate()+'. '+MN[d.getMonth()]; }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── BAVARIAN HOLIDAYS 2026–2028 ──────────────────────
function easterDate(y){
  var a=y%19,b=Math.floor(y/100),c=y%100;
  var d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  var g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  var i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  var m=Math.floor((a+11*h+22*l)/451);
  var mo=Math.floor((h+l-7*m+114)/31),dy=(h+l-7*m+114)%31+1;
  return new Date(y,mo-1,dy);
}
function fmtD(d){var mm=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);return d.getFullYear()+'-'+mm+'-'+dd;}
function buildHolidays(){
  var h={};
  function addH(key,name){ h[key]=h[key]?h[key]+' / '+name:name; }
  [2026,2027,2028].forEach(function(y){
    var e=easterDate(y);
    addH(y+'-01-01','Neujahr');
    addH(y+'-01-06','Heilige Drei Könige');
    addH(y+'-05-01','Tag der Arbeit');
    addH(y+'-08-15','Mariä Himmelfahrt');
    addH(y+'-10-03','Tag der Deutschen Einheit');
    addH(y+'-11-01','Allerheiligen');
    addH(y+'-12-25','1. Weihnachtsfeiertag');
    addH(y+'-12-26','2. Weihnachtsfeiertag');
    addH(fmtD(addDays(e,-2)),'Karfreitag');
    addH(fmtD(e),'Ostersonntag');
    addH(fmtD(addDays(e,1)),'Ostermontag');
    addH(fmtD(addDays(e,39)),'Christi Himmelfahrt');
    addH(fmtD(addDays(e,49)),'Pfingstsonntag');
    addH(fmtD(addDays(e,50)),'Pfingstmontag');
    addH(fmtD(addDays(e,60)),'Corpus Christi');
    addH(y+'-10-31','Reformationstag');
  });
  return h;
}
var HOLIDAYS = buildHolidays();

function getStatus(t) {
  if(t.done||(t.progress||0)>=100) return 'done';
  if(!t.done&&t.end<todayStr&&(t.progress||0)<100) return 'overdue';
  if((t.progress||0)>0&&t.start<=todayStr) return 'active';
  if(t.start>todayStr) return 'planned';
  return 'active';
}
function statusLabel(s){
  return {done:'Erledigt',overdue:'Uberfällig',active:'In Arbeit',planned:'Geplant'}[s]||s;
}

function changeWeek(dir){ currentMonday=addDays(currentMonday,dir*7); render(); }
function goToday(){ currentMonday=getMonday(today); render(); }

// ── Does task overlap with a given day range (Mon-Sun)? ──
function taskInWeek(t, monStr, sunStr) {
  if(t.hidden) return false;
  // Urlaub: check urlaubPeriods, not the overall start/end
  if(t.type==='urlaub' && t.urlaubPeriods && t.urlaubPeriods.length){
    for(var i=0;i<t.urlaubPeriods.length;i++){
      var up=t.urlaubPeriods[i];
      if(up.start<=sunStr && up.end>=monStr) return true;
    }
    return false;
  }
  if(t.start<=sunStr && t.end>=monStr) return true;
  if(t.extraPeriods&&t.extraPeriods.length){
    for(var i=0;i<t.extraPeriods.length;i++){
      var ep=t.extraPeriods[i];
      if(ep.start<=sunStr && ep.end>=monStr) return true;
    }
  }
  return false;
}

// ── Calculate bar position (left%, width%) within the 7-day grid ──
function barPos(startStr, endStr, monStr, sunStr) {
  var monD = new Date(monStr), friD = addDays(new Date(monStr), 4);
  var s = new Date(startStr), e = new Date(endStr);
  // Clamp to Mon-Fri boundaries
  if(s < monD) s = monD;
  if(e > friD) e = friD;
  var dayStart = Math.round((s - monD) / 86400000);
  var dayEnd = Math.round((e - monD) / 86400000);
  if(dayStart > 4) dayStart = 4;
  if(dayEnd > 4) dayEnd = 4;
  var left = (dayStart / 5) * 100;
  var width = ((dayEnd - dayStart + 1) / 5) * 100;
  return { left: left, width: width };
}

function render() {
  var kw = getISOWeek(currentMonday);
  var friday = addDays(currentMonday, 4);
  var sunday = addDays(currentMonday, 6);
  var monStr = toStr(currentMonday), sunStr = toStr(sunday);

  document.getElementById('kwLabel').textContent = 'KW ' + kw;
  document.getElementById('kwDates').textContent = fmtDateShort(currentMonday) + ' – ' + fmtDateShort(friday) + ' ' + currentMonday.getFullYear();

  var todayMonday = getMonday(today);
  document.getElementById('btnToday').className = 'btn-today' + (currentMonday.getTime()===todayMonday.getTime()?' hidden':'');

  // Day header
  var dhHtml = '';
  for(var d=0;d<5;d++){
    var dd = addDays(currentMonday, d);
    var dStr = toStr(dd);
    var cls = 'day-hdr-cell';
    var holName = HOLIDAYS[dStr] || '';
    if(dStr===todayStr) cls += ' today';
    else if(holName) cls += ' holiday';
    dhHtml += '<div class="'+cls+'"><div class="dn">'+DN[d]+'</div><div class="dd">'+dd.getDate()+'</div>'+(holName?'<div class="hol-name">'+esc(holName)+'</div>':'')+'</div>';
  }
  document.getElementById('dayHeaderRow').innerHTML = dhHtml;

  // Build ordered rows matching Gantt file order (root tasks in array order, children nested)
  var childrenOf = {};
  tasks.forEach(function(t){
    if(t.parentId){
      if(!childrenOf[t.parentId]) childrenOf[t.parentId] = [];
      childrenOf[t.parentId].push(t);
    }
  });

  function addChildren(parentId, depth, list){
    var ch = childrenOf[parentId];
    if(!ch) return;
    ch.forEach(function(t){
      if(t.hidden) return;
      if(t.type==='urlaub'||t.type==='meeting') return;
      var matches = !!t.showInTaskView && canSeeTask(t);
      if(matches && taskInWeek(t, monStr, sunStr)){
        list.push({task:t, depth:0});
      }
      // Always recurse to find matching descendants
      addChildren(t.id, depth+1, list);
    });
  }

  // Helper: does a task have any matching descendants in this week? (recursive)
  function hasMatchingDescendant(parentId){
    var ch = childrenOf[parentId];
    if(!ch) return false;
    return ch.some(function(c){
      if(c.hidden) return false;
      if(c.showInTaskView && canSeeTask(c)){
        if(taskInWeek(c, monStr, sunStr)) return true;
      }
      return hasMatchingDescendant(c.id);
    });
  }

  var orderedNormal = [];
  // Root tasks in original array order
  tasks.forEach(function(t){
    if(t.parentId) return;
    if(t.hidden) return;
    if(t.type==='urlaub'||t.type==='meeting') return;
    var rootMatches = !!t.showInTaskView && canSeeTask(t);
    if(rootMatches && taskInWeek(t, monStr, sunStr)){
      orderedNormal.push({task:t, depth:0});
    }
    // Always recurse to find matching descendants
    addChildren(t.id, 1, orderedNormal);
  });

  var vacations = tasks.filter(function(t){ return t.type==='urlaub'&&!t.hidden&&taskInWeek(t,monStr,sunStr); });
  var meetings = tasks.filter(function(t){ return t.type==='meeting'&&!t.hidden&&taskInWeek(t,monStr,sunStr); });
  function canSeeOutlookEvent(t){
    if(currentUser && currentUser.toLowerCase()==='admin') return true;
    if(!currentUserEmail) return false;
    if(t.ownerEmail && t.ownerEmail===currentUserEmail) return true;
    return false;
  }
  // Outlook-Termine aus tasks: nur anzeigen wenn User berechtigt ist
  var filteredMeetings = meetings.filter(function(t){
    if(t.source==='outlook') return canSeeOutlookEvent(t);
    return true;
  });
  var outlookInWeek = outlookEvents.filter(function(t){
    if(!taskInWeek(t, monStr, sunStr)) return false;
    return canSeeOutlookEvent(t);
  });
  var allMeetings = filteredMeetings.concat(outlookInWeek);
  allMeetings.sort(function(a,b){
    if(a.start!==b.start) return a.start<b.start?-1:1;
    if(a.startTime&&b.startTime&&a.startTime!==b.startTime) return a.startTime<b.startTime?-1:1;
    return 0;
  });

  var html = '';

  // ── Normal tasks ──
  if(orderedNormal.length){
    html += '<div class="section-row"><span class="section-icon">&#9654;</span>Aufgaben<span class="section-count">'+orderedNormal.length+'</span></div>';
    orderedNormal.forEach(function(item){ html += renderRow(item.task, monStr, sunStr, item.depth > 0); });
  }

  // ── Vacations ──
  if(vacations.length){
    html += '<div class="section-row"><span class="section-icon">&#127958;</span>Urlaub<span class="section-count">'+vacations.length+'</span></div>';
    vacations.forEach(function(t){ html += renderRow(t, monStr, sunStr, false); });
  }

  // ── Meetings (manuell + Outlook) ──
  if(allMeetings.length){
    html += '<div class="section-row"><span class="section-icon">&#128197;</span>Meetings<span class="section-count">'+allMeetings.length+'</span></div>';
    allMeetings.forEach(function(t){ html += renderRow(t, monStr, sunStr, false); });
  }

  if(!html) html = '<div class="empty-message">Keine Aufgaben in dieser Woche.</div>';
  document.getElementById('ganttBody').innerHTML = html;
  document.getElementById('ganttBody').style.display = 'block';
  document.getElementById('loadingArea').style.display = 'none';

}

function renderRow(t, monStr, sunStr, isChild) {
  var s = getStatus(t);
  var isPrivate = t.visibleTo && t.visibleTo.length===1 && t.visibleTo[0]===currentUser;
  var color = t.type==='urlaub' ? '#f59e0b' : t.source==='outlook' ? '#8b5cf6' : isPrivate ? 'rgba(245,158,11,0.5)' : '#60a5fa';
  var pct = t.progress || 0;
  var name = esc(t.name || '');
  var childCls = isChild ? ' child-row' : '';

  var labelCls = isChild ? ' child-label' : '';
  var childCls2 = isChild ? ' child-row' : '';

  var idParam = typeof t.id==='string' ? "'"+t.id.replace(/'/g,"\\'")+"'" : t.id;
  var h = '<div class="gantt-group" onclick="showDetail('+idParam+')">';

  // Label row
  var timeLabel = (t.source==='outlook'&&t.startTime) ? esc(t.startTime)+(t.endTime?' – '+esc(t.endTime):'') : '';
  h += '<div class="gantt-label-row'+labelCls+'">'+name+'</div>';

  // Bar row
  h += '<div class="gantt-row'+childCls2+'">';
  h += '<div class="day-cells">';
  for(var d=0;d<5;d++){
    var dStr = toStr(addDays(new Date(monStr),d));
    var cls = 'day-cell';
    if(dStr===todayStr) cls += ' today-col';
    else if(HOLIDAYS[dStr]) cls += ' holiday-col';
    h += '<div class="'+cls+'"></div>';
  }

  // Bars
  var doneCls = s==='done'?' done-bar':'';
  if(t.type==='urlaub' && t.urlaubPeriods && t.urlaubPeriods.length){
    t.urlaubPeriods.forEach(function(up){
      if(up.start<=sunStr && up.end>=monStr){
        var ubp = barPos(up.start, up.end, monStr, sunStr);
        h += '<div class="task-bar" style="left:'+ubp.left+'%;width:'+ubp.width+'%">';
        h += '<div class="bar-bg" style="background:'+color+'"></div>';
        h += '</div>';
      }
    });
  } else {
    var bp = barPos(t.start, t.end, monStr, sunStr);
    h += '<div class="task-bar'+doneCls+'" style="left:'+bp.left+'%;width:'+bp.width+'%">';
    h += '<div class="bar-bg" style="background:'+color+'">';
    if(pct>0 && pct<100){
      h += '<div class="bar-progress" style="width:'+pct+'%"></div>';
    }
    h += '</div>';
    if(timeLabel) h += '<span class="bar-time">'+timeLabel+'</span>';
    if(taskTodos[t.id]&&taskTodos[t.id].length) h += '<div class="todo-dot"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 12l2 2 4-4"/><path d="M9 17h6"/></svg></div>';
    h += '</div>';

    if(t.extraPeriods&&t.extraPeriods.length){
      t.extraPeriods.forEach(function(ep){
        if(ep.start<=sunStr && ep.end>=monStr){
          var ebp = barPos(ep.start, ep.end, monStr, sunStr);
          h += '<div class="task-bar-extra" style="left:'+ebp.left+'%;width:'+ebp.width+'%;background:'+color+'"></div>';
        }
      });
    }
  }

  h += '</div>'; // day-cells
  h += '</div>'; // gantt-row
  h += '</div>'; // gantt-group
  return h;
}

// ── Detail / Edit Modal ──
var _editTaskId=null;
function showDetail(id) {
  var t=null;
  for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){t=tasks[i];break;}}
  if(!t){for(var i=0;i<outlookEvents.length;i++){if(outlookEvents[i].id===id){t=outlookEvents[i];break;}}}
  if(!t) return;

  // Outlook-Termine: editierbare Ansicht
  if(t.source==='outlook'){
    _editMeetingId=t.id;
    var h=todoSectionHtml();
    h+='<h2 class="modal-heading">Meeting bearbeiten</h2>';
    h+='<div class="add-field"><label>Name</label>';
    h+='<input type="text" id="editMeetingName" value="'+esc(t.name||'')+'"></div>';
    h+='<div class="add-field"><label>Beginn (Datum)</label>';
    h+='<input type="date" id="editMeetingStart" value="'+(t.start||'')+'"></div>';
    h+='<div class="add-field"><label>Ende (Datum)</label>';
    h+='<input type="date" id="editMeetingEnd" value="'+(t.end||t.start||'')+'"></div>';
    h+='<div class="field-row">';
    h+='<div class="add-field field-half"><label>Startzeit</label>';
    h+='<input type="time" id="editMeetingStartTime" value="'+(t.startTime||'')+'"></div>';
    h+='<div class="add-field field-half"><label>Endzeit</label>';
    h+='<input type="time" id="editMeetingEndTime" value="'+(t.endTime||'')+'"></div>';
    h+='</div>';
    h+='<div class="add-field"><label>Organisator</label>';
    h+='<input type="text" id="editMeetingOrganizer" value="'+esc(t.organizer||'')+'"></div>';
    h+='<div class="add-error" id="editMeetingError"></div>';
    h+='<div class="add-actions">';
    h+='<button class="btn-cancel" onclick="closeModal()">Abbrechen</button>';
    h+='<button class="btn-save" onclick="saveMeeting()">Speichern</button>';
    h+='</div>';
    h+='<button class="btn-delete" id="btnDelMeeting">Meeting löschen</button>';
    document.getElementById('modalContent').innerHTML=h;
    document.getElementById('btnDelMeeting').addEventListener('click',function(){askDeleteMeeting(_editMeetingId,document.getElementById('editMeetingName').value);});
    _currentTodoTaskId=t.id;
    loadTodos(t.id,renderTodoList);
    document.getElementById('modalBg').classList.add('open');
    return;
  }

  _editTaskId=id;
  var pct=t.progress||0;

  var h=todoSectionHtml();
  h+='<h2>Aufgabe bearbeiten</h2>';

  // Name
  h+='<div class="add-field"><label>Name</label>';
  h+='<input type="text" id="editName" value="'+esc(t.name||'')+'"></div>';

  // Parent
  h+='<div class="add-field"><label>Übergeordnete Aufgabe</label>';
  h+='<select id="editParent"><option value="">— Keine (Hauptaufgabe) —</option>';
  tasks.forEach(function(p){
    if(p.parentId||p.hidden||p.type==='urlaub'||p.type==='meeting'||p.id===id) return;
    h+='<option value="'+p.id+'"'+(t.parentId===p.id?' selected':'')+'>'+esc(p.name)+'</option>';
  });
  h+='</select></div>';

  // Start
  h+='<div class="add-field"><label>Beginn</label>';
  h+='<input type="date" id="editStart" value="'+(t.start||'')+'"></div>';

  // End
  h+='<div class="add-field"><label>Ende</label>';
  h+='<input type="date" id="editEnd" value="'+(t.end||'')+'"></div>';

  // Progress
  if(t.type!=='urlaub'&&t.type!=='meeting'){
    h+='<div class="add-field"><label>Fortschritt ('+pct+'%)</label>';
    h+='<input type="range" id="editProgress" min="0" max="100" value="'+pct+'" style="min-height:auto;padding:0" oninput="this.previousElementSibling.textContent=\'Fortschritt (\'+this.value+\'%)\'"></div>';
  }

  // Done checkbox
  h+='<div class="add-field" style="display:flex;align-items:center;gap:10px">';
  h+='<input type="checkbox" id="editDone" style="width:20px;height:20px;min-height:auto;padding:0;accent-color:var(--green)"'+(t.done?' checked':'')+'>';
  h+='<label style="margin:0" for="editDone">Erledigt</label></div>';

  // Sichtbarkeit
  h+=visibilityChipsHtml(t.visibleTo);

  // Error
  h+='<div class="add-error" id="editError"></div>';

  // Action buttons
  h+='<div class="add-actions">';
  h+='<button class="btn-cancel" onclick="closeModal()">Abbrechen</button>';
  h+='<button class="btn-save" onclick="saveEditTask()">Speichern</button>';
  h+='</div>';

  // Delete button
  h+='<button class="btn-delete" onclick="askDelete('+t.id+',\''+esc(t.name).replace(/'/g,"\\'")+'\')">Aufgabe löschen</button>';

  document.getElementById('modalContent').innerHTML=h;
  _currentTodoTaskId=id;
  loadTodos(id,renderTodoList);
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ _editTaskId=null; document.getElementById('modalBg').classList.remove('open'); }

// ── TO-DO FUNKTIONEN (gespeichert in technology/state.todos) ──
function loadAllTodos(){
  GANTT_DOC.get().then(function(doc){
    if(!doc.exists)return;
    var d=doc.data();
    taskTodos=d.todos||{};
    render();
  }).catch(function(e){console.warn('Todos laden fehlgeschlagen:',e);});
}
function loadTodos(taskId,cb){
  var id=String(taskId);
  cb(taskTodos[id]||[]);
}
function saveTodos(taskId,items){
  var id=String(taskId);
  items=items.filter(function(it){return it.text.trim()||it.date;});
  if(!items.length){ delete taskTodos[id]; } else { taskTodos[id]=items; }
  var update={};
  update['todos.'+id]=items.length?items:firebase.firestore.FieldValue.delete();
  GANTT_DOC.update(update).catch(function(e){console.warn('Todos speichern fehlgeschlagen:',e);});
  render();
}

// ── TO-DO UI FUNKTIONEN ──
var _currentTodoTaskId=null;
function renderTodoList(items){
  var el=document.getElementById('todoList');
  if(!el)return;
  var h='';
  items.forEach(function(it,i){
    h+='<div class="todo-item">';
    h+='<span class="todo-num">'+(i+1)+'.</span>';
    h+='<textarea placeholder="Beschreibung" rows="1">'+esc(it.text||'')+'</textarea>';
    h+='<button class="todo-del" onclick="removeTodoRow('+i+')" title="Entfernen">&#x2715;</button>';
    h+='</div>';
  });
  el.innerHTML=h;
}
function addTodoRow(){
  var el=document.getElementById('todoList');
  if(!el)return;
  var d=document.createElement('div');d.className='todo-item';
  var num=el.querySelectorAll('.todo-item').length+1;
  d.innerHTML='<span class="todo-num">'+num+'.</span>'
    +'<textarea placeholder="Beschreibung" rows="1"></textarea>'
    +'<button class="todo-del" onclick="removeTodoRow(-1,this)" title="Entfernen">&#x2715;</button>';
  el.appendChild(d);
  d.querySelector('textarea').focus();
}
function removeTodoRow(idx,btn){
  var el=document.getElementById('todoList');
  if(!el)return;
  if(btn){btn.parentElement.remove();return;}
  var rows=el.querySelectorAll('.todo-item');
  if(rows[idx])rows[idx].remove();
}
function collectTodoItems(){
  var el=document.getElementById('todoList');
  if(!el)return [];
  var items=[];
  el.querySelectorAll('.todo-item').forEach(function(row){
    var textArea=row.querySelector('textarea');
    var text=textArea?textArea.value:'';
    if(text.trim()) items.push({text:text});
  });
  return items;
}
function todoSectionHtml(){
  return '<div class="todo-section"><h3>To-Do Liste</h3>'
    +'<div class="todo-list" id="todoList"></div>'
    +'<button class="todo-add" onclick="addTodoRow()">+ To-Do</button></div>';
}

// ── Sichtbarkeit pro User ──
function visibilityChipsHtml(selectedUsers){
  var allSelected=!selectedUsers||!selectedUsers.length;
  var h='<div class="add-field"><label>Sichtbar f\u00fcr</label><div class="visibility-chips" id="visChips">';
  USERS.forEach(function(u){
    var active=allSelected||(selectedUsers&&selectedUsers.indexOf(u.name)!==-1);
    h+='<button type="button" class="vis-chip'+(active?' active':'')+'" onclick="this.classList.toggle(\'active\')" data-user="'+esc(u.name)+'">'+esc(u.name)+'</button>';
  });
  h+='</div></div>';
  return h;
}
function collectVisibleTo(){
  var chips=document.querySelectorAll('#visChips .vis-chip');
  var active=[];var total=0;
  chips.forEach(function(c){total++;if(c.classList.contains('active'))active.push(c.getAttribute('data-user'));});
  return active.length===total?null:active;
}
function canSeeTask(t){
  if(!t.visibleTo||!t.visibleTo.length) return true;
  return t.visibleTo.indexOf(currentUser)!==-1;
}

// ── Save Edit ──
function saveEditTask(){
  if(!_editTaskId) return;
  var name=document.getElementById('editName').value.trim();
  var parentId=document.getElementById('editParent').value;
  var start=document.getElementById('editStart').value;
  var end=document.getElementById('editEnd').value;
  var progressEl=document.getElementById('editProgress');
  var progress=progressEl?parseInt(progressEl.value):0;
  var done=document.getElementById('editDone').checked;
  var errEl=document.getElementById('editError');

  if(!name){errEl.textContent='Bitte einen Namen eingeben.';errEl.style.display='block';return;}
  if(!start||!end){errEl.textContent='Bitte Beginn und Ende angeben.';errEl.style.display='block';return;}
  if(end<start){errEl.textContent='Ende darf nicht vor Beginn liegen.';errEl.style.display='block';return;}
  errEl.style.display='none';
  var visibleTo=collectVisibleTo();

  var editId=_editTaskId;
  GANTT_DOC.get().then(function(doc){
    if(!doc.exists) return;
    var state=doc.data();
    if(!state.tasks) return;
    for(var i=0;i<state.tasks.length;i++){
      if(state.tasks[i].id===editId){
        state.tasks[i].name=name;
        state.tasks[i].start=start;
        state.tasks[i].end=end;
        state.tasks[i].parentId=parentId?parseInt(parentId):null;
        state.tasks[i].progress=progress;
        state.tasks[i].done=done;
        state.tasks[i].visibleTo=visibleTo;
        break;
      }
    }
    state.savedAt=new Date().toISOString();
    // To-Dos direkt im State speichern
    var todoItems=collectTodoItems().filter(function(it){return it.text.trim()||it.date;});
    if(!state.todos) state.todos={};
    if(todoItems.length) state.todos[String(editId)]=todoItems; else delete state.todos[String(editId)];
    taskTodos=state.todos;
    return GANTT_DOC.set(state);
  }).then(function(){
    closeModal();
  }).catch(function(e){
    console.error('Edit error:',e);
    errEl.textContent='Fehler beim Speichern: '+e.message;
    errEl.style.display='block';
  });
}

// ── Delete Task ──
var _deleteTaskId=null;
function askDelete(id,name){
  _deleteTaskId=id;
  var childCount=tasks.filter(function(t){return t.parentId===id;}).length;
  var msg='Die Aufgabe <strong>„'+name+'"</strong> wird unwiderruflich gelöscht.';
  if(childCount>0) msg+='<br><br>⚠ Inklusive <strong>'+childCount+' Unteraufgabe'+(childCount>1?'n':'')+'</strong>.';
  document.getElementById('confirmText').innerHTML=msg;
  document.getElementById('confirmModalBg').classList.add('open');
}
function closeConfirm(){
  _deleteTaskId=null;
  document.getElementById('confirmModalBg').classList.remove('open');
}
function confirmDelete(){
  if(!_deleteTaskId) return;
  var delId=_deleteTaskId;
  closeConfirm();
  closeModal();

  GANTT_DOC.get().then(function(doc){
    if(!doc.exists) return;
    var state=doc.data();
    if(!state.tasks) return;
    // Collect IDs to delete (task + all descendants)
    var idsToDelete={};
    idsToDelete[delId]=true;
    var changed=true;
    while(changed){
      changed=false;
      state.tasks.forEach(function(t){
        if(t.parentId&&idsToDelete[t.parentId]&&!idsToDelete[t.id]){
          idsToDelete[t.id]=true;
          changed=true;
        }
      });
    }
    state.tasks=state.tasks.filter(function(t){return !idsToDelete[t.id];});
    // Todos der gelöschten Tasks entfernen
    if(state.todos){Object.keys(idsToDelete).forEach(function(id){delete state.todos[String(id)];});taskTodos=state.todos;}
    state.savedAt=new Date().toISOString();
    return GANTT_DOC.set(state);
  }).catch(function(e){
    console.error('Delete error:',e);
  });
}

// ── Add Task ──
function openAddTask(){
  // Populate parent dropdown
  var sel=document.getElementById('addParent');
  sel.innerHTML='<option value="">— Keine (Hauptaufgabe) —</option>';
  tasks.forEach(function(t){
    if(t.parentId||t.hidden||t.type==='urlaub'||t.type==='meeting') return;
    var o=document.createElement('option');
    o.value=t.id;
    o.textContent=t.name;
    sel.appendChild(o);
  });
  // Default dates: today + 7 days
  var todayD=new Date();
  document.getElementById('addStart').value=toStr(todayD);
  document.getElementById('addEnd').value=toStr(addDays(todayD,7));
  document.getElementById('addName').value='';
  document.getElementById('addVisibility').innerHTML=visibilityChipsHtml(null);
  document.getElementById('addError').style.display='none';
  document.getElementById('addModalBg').classList.add('open');

function closeAddModal(){
  document.getElementById('addModalBg').classList.remove('open');
}

function saveNewTask(){
  var name=document.getElementById('addName').value.trim();
  var parentId=document.getElementById('addParent').value;
  var start=document.getElementById('addStart').value;
  var end=document.getElementById('addEnd').value;
  var errEl=document.getElementById('addError');

  // Validation
  if(!name){errEl.textContent='Bitte einen Namen eingeben.';errEl.style.display='block';return;}
  if(!start||!end){errEl.textContent='Bitte Beginn und Ende angeben.';errEl.style.display='block';return;}
  if(end<start){errEl.textContent='Ende darf nicht vor Beginn liegen.';errEl.style.display='block';return;}
  errEl.style.display='none';
  var visibleTo=collectVisibleTo();

  // Read fresh state from Firestore, add task, write back
  GANTT_DOC.get().then(function(doc){
    if(!doc.exists){errEl.textContent='Fehler: Kein gespeicherter State gefunden.';errEl.style.display='block';return;}
    var state=doc.data();
    var nid=state.nid||state.tasks.length+2;
    var newTask={
      id:nid,
      name:name,
      start:start,
      end:end,
      progress:0,
      color:'#4f6ef7',
      deps:[],
      parentId:parentId?parseInt(parentId):null,
      extraPeriods:[],
      milestone:null,
      done:false,
      showInTaskView:true,
      visibleTo:visibleTo
    };
    state.tasks.push(newTask);
    state.nid=nid+1;
    state.savedAt=new Date().toISOString();
    return GANTT_DOC.set(state);
  }).then(function(){
    closeAddModal();
    // The onSnapshot listener will automatically pick up the change and re-render
  }).catch(function(e){
    console.error('Save error:',e);
    errEl.textContent='Fehler beim Speichern: '+e.message;
    errEl.style.display='block';
  });
}

(function(){

// ── Firebase ──
function markConnected(){ document.getElementById('statusDot').className='status-dot connected'; }
function markError(){ document.getElementById('statusDot').className='status-dot error'; }
function doRefresh(){
  GANTT_DOC.get().then(function(doc){
    if(doc.exists){var d=doc.data();if(d.tasks&&d.tasks.length){tasks=d.tasks;render();}}
    markConnected();
  }).catch(function(){markError();});
}

// ── BENUTZERVERWALTUNG ──
var USERS = [
  {name:'Admin', hash:btoa('admin123'), role:'admin'},
  {name:'User',  hash:btoa('user123'),  role:'user'}
];
var currentUser = null;
var currentUserRole = null;
var currentUserEmail = null;
function updateUserDisplay(){
  var el=document.getElementById('userDisplay');
  if(el) el.textContent=currentUser?currentUser:'';
}
var _firebaseStarted = false;

function simpleHash(str){
  try{return btoa(unescape(encodeURIComponent(str)));}catch(e){return btoa(str);}
}

function doLogin(){
  var pw=document.getElementById('login-pw').value;
  var name=document.getElementById('login-name').value.trim();
  if(!pw||!name){
    var err=document.getElementById('login-err');
    err.textContent='Bitte Name und Passwort eingeben.';
    setTimeout(function(){err.textContent='';},3000);
    return;
  }
  var h=simpleHash(pw);
  var user=USERS.find(function(u){return u.name.toLowerCase()===name.toLowerCase()&&u.hash===h;});
  if(user){
    currentUser=user.name;
    currentUserRole=user.role||'user';
    currentUserEmail=(user.email||'').toLowerCase();
    try{localStorage.setItem('taskview_auth_session',JSON.stringify({user:user.name,role:user.role,email:user.email||'',ts:Date.now()}));}catch(e){}
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('mainHeader').style.display='';
    updateUserDisplay();
    document.getElementById('login-pw').value='';
    document.getElementById('login-name').value='';
    firebaseStart();
  } else {
    var err=document.getElementById('login-err');
    err.textContent='Name oder Passwort falsch.';
    document.getElementById('login-pw').select();
    setTimeout(function(){err.textContent='';},3000);
  }
}

function firebaseStart(){
  if(_firebaseStarted) return;
  _firebaseStarted=true;

  loadAllTodos();
  GANTT_DOC.get().then(function(doc){
    if(doc.exists){var d=doc.data();if(d.tasks&&d.tasks.length) tasks=d.tasks;}
    render(); markConnected();
  }).catch(function(e){
    console.error('Firebase error:',e);
    document.getElementById('loadingArea').innerHTML='<div class="error-message">&#x26A0; Verbindung fehlgeschlagen<br><button onclick="location.reload()" class="btn-retry">Erneut versuchen</button></div>';
    markError();
  });

  _unsubGantt = GANTT_DOC.onSnapshot(function(doc){
    if(!doc.exists)return;
    var d=doc.data();if(!d||!d.tasks)return;
    tasks=d.tasks;
    if(d.todos) taskTodos=d.todos;
    render(); markConnected();
  },function(err){console.warn('Snapshot error:',err);});

  // ── Outlook-Termine via outlook_sync.py (ol_* Dokumente) ──
  _unsubOutlook = OUTLOOK_COL.onSnapshot(function(snap){
    outlookEvents=[];
    snap.forEach(function(doc){
      var d=doc.data();
      if(!doc.id.startsWith('ol_')) return;
      if(d.deleted) return;
      var att=Array.isArray(d.attendees)?d.attendees.map(function(a){return(a||'').toLowerCase();}):[];
      outlookEvents.push({
        id:'outlook_'+doc.id,
        name:d.name||d.subject||'Outlook-Termin',
        start:d.start||'',
        end:d.end||d.start||'',
        startTime:d.startTime||'',
        endTime:d.endTime||'',
        organizer:d.organizer||'',
        attendees:att,
        ownerEmail:(d.ownerEmail||'').toLowerCase(),
        type:'meeting',
        source:'outlook',
        progress:0,
        done:false
      });
    });
    if(tasks.length>0) render();
  },function(err){
    console.warn('Outlook events nicht verfügbar:',err);
  });
}

function showLogin(){
  document.getElementById('login-overlay').style.display='flex';
  setTimeout(function(){var el=document.getElementById('login-name');if(el)el.focus();},100);
}

function doLogout(){
  if(_unsubGantt){_unsubGantt();_unsubGantt=null;}
  if(_unsubOutlook){_unsubOutlook();_unsubOutlook=null;}
  currentUser=null;
  currentUserRole=null;
  currentUserEmail=null;
  _firebaseStarted=false;
  updateUserDisplay();
  try{localStorage.removeItem('taskview_auth_session');}catch(e){}
  document.getElementById('mainHeader').style.display='none';
  document.getElementById('login-overlay').style.display='flex';
  document.getElementById('login-pw').value='';
  document.getElementById('login-name').value='';
  setTimeout(function(){var el=document.getElementById('login-name');if(el)el.focus();},100);
}

// ── Initialisierung: USERS aus Firebase laden, dann Login zeigen ──
(function(){
  var loginShown=false;
  function tryShowLogin(){
    if(loginShown) return;
    loginShown=true;
    // Auto-Login aus Session prüfen
    try{
      var s=JSON.parse(localStorage.getItem('taskview_auth_session'));
      if(s&&s.user&&(Date.now()-s.ts)<86400000){
        var user=USERS.find(function(u){return u.name.toLowerCase()===s.user.toLowerCase();});
        if(user){
          currentUser=user.name;
          currentUserRole=user.role||'user';
          currentUserEmail=(user.email||s.email||'').toLowerCase();
          document.getElementById('mainHeader').style.display='';
          updateUserDisplay();
          firebaseStart();
          return;
        }
      }
    }catch(e){}
    showLogin();
  }
  var fallback=setTimeout(tryShowLogin,1500);
  var fallback2=setTimeout(tryShowLogin,5000);
  GANTT_DOC.get().then(function(doc){
    clearTimeout(fallback);clearTimeout(fallback2);
    if(doc.exists){
      var d=doc.data();
      if(d.users&&d.users.length){ USERS=d.users; }
    }
    tryShowLogin();
  }).catch(function(){
    clearTimeout(fallback);clearTimeout(fallback2);
    tryShowLogin();
  });
})();
