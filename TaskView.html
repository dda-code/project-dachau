<style>
:root {
  --bg: #f5f6fa;
  --bg2: #ffffff;
  --text: #1a1d2e;
  --text2: #64748b;
  --text3: #94a3b8;
  --border: #e2e8f0;
  --accent: #4f6ef7;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --col-w: calc(100% / 7);
}
@media(prefers-color-scheme:dark){
  :root {
    --bg: #0f1117; --bg2: #1a1d2e; --text: #e8eaf0;
    --text2: #94a3b8; --text3: #64748b; --border: #2a2d3e;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(20px + var(--safe-bottom));
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2);
  padding: calc(8px + var(--safe-top)) 12px 0;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  margin-bottom: 8px;
}
.logo {
  height: 40px; width: auto; flex-shrink: 0;
}
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  background: var(--text3); transition: background .3s;
}
.status-dot.connected { background: var(--green); }
.status-dot.error { background: var(--red); }
.btn-icon {
  background: none; border: none; font-size: 18px; cursor: pointer;
  color: var(--text2); padding: 4px; border-radius: 8px;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon:active { background: var(--border); }

/* ── Week Nav ── */
.week-nav {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  margin-bottom: 8px;
}
.week-nav .btn-icon { font-size: 18px; min-width: 32px; min-height: 32px; }
.kw-label { font-size: 16px; font-weight: 700; color: var(--accent); min-width: 60px; text-align: center; }
.kw-dates { font-size: 11px; color: var(--text2); text-align: center; }
.btn-today {
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 14px; border: 1px solid var(--accent);
  background: none; color: var(--accent); cursor: pointer; min-height: 28px;
}
.btn-today:active { background: var(--accent); color: #fff; }
.btn-today.hidden { visibility: hidden; }

/* ── Day Header Grid ── */
.day-header-row {
  display: flex; align-items: stretch;
  border-top: 1px solid var(--border);
}
.day-hdr-cell {
  flex: 1; text-align: center; padding: 6px 0 4px;
  border-left: 1px solid var(--border);
  font-size: 11px; line-height: 1.3;
}
.day-hdr-cell:first-child { border-left: none; }
.day-hdr-cell .dn { font-weight: 700; text-transform: uppercase; color: var(--text2); }
.day-hdr-cell .dd { font-size: 12px; font-weight: 600; color: var(--text); }
.day-hdr-cell.today { background: var(--accent); }
.day-hdr-cell.today .dn, .day-hdr-cell.today .dd { color: #fff; }
.day-hdr-cell.weekend .dn, .day-hdr-cell.weekend .dd { color: var(--text3); }

/* ── Gantt Rows ── */
.gantt-body { padding-bottom: 40px; }
.gantt-group {
  border-bottom: 1px solid var(--border); cursor: pointer;
}
.gantt-group:active { background: rgba(79,110,247,.04); }
.gantt-label-row {
  padding: 6px 8px 2px; font-size: 12px; font-weight: 600;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gantt-label-row.child-label { padding-left: 20px; font-size: 11px; font-weight: 500; }
.gantt-row {
  display: flex; position: relative;
  min-height: 26px;
}
.gantt-row.child-row .task-bar { opacity: .75; }
.day-cells {
  flex: 1; display: flex; position: relative;
  overflow: visible;
}
.day-cell {
  flex: 1; border-left: 1px solid var(--border);
  min-height: 100%;
}
.day-cell:first-child { border-left: none; }
.day-cell.today-col { background: rgba(79,110,247,.06); }
.day-cell.weekend-col { background: rgba(0,0,0,.02); }
@media(prefers-color-scheme:dark){
  .day-cell.today-col { background: rgba(79,110,247,.1); }
  .day-cell.weekend-col { background: rgba(255,255,255,.02); }
}

/* ── Task Bar with label inside ── */
.task-bar {
  position: absolute; top: 2px; bottom: 2px;
  border-radius: 4px; min-width: 6px;
  z-index: 2; display: flex; align-items: center;
  overflow: visible;
}
.task-bar.done-bar { opacity: .4; }
.bar-bg {
  position: absolute; inset: 0; border-radius: 4px;
  overflow: hidden;
}
.bar-progress {
  height: 100%; border-radius: 4px;
  background: rgba(255,255,255,.25);
}
.milestone-diamond {
  position: absolute; top: 50%; width: 10px; height: 10px;
  background: var(--amber); transform: translate(-50%, -50%) rotate(45deg);
  z-index: 3; border: 1px solid rgba(0,0,0,.15);
}
/* Extra period bar (no label) */
.task-bar-extra {
  position: absolute; top: 2px; bottom: 2px;
  border-radius: 4px; min-width: 6px;
  z-index: 1; opacity: .45;
}

/* ── Section Headers ── */
.section-row {
  display: flex; align-items: center;
  background: var(--bg); padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text3); gap: 6px;
  position: sticky; top: 0; z-index: 5;
}
.section-icon { font-size: 13px; }
.section-count {
  background: var(--border); border-radius: 8px; padding: 1px 6px;
  font-size: 10px;
}

/* ── Detail Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg2); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 500px; max-height: 75dvh;
  padding: 16px 20px calc(16px + var(--safe-bottom));
  overflow-y: auto; animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px; background: var(--border);
  margin: 0 auto 14px;
}
.modal h2 { font-size: 17px; margin-bottom: 10px; line-height: 1.3; }
.modal-row {
  display: flex; justify-content: space-between; padding: 7px 0;
  border-bottom: 1px solid var(--border); font-size: 13px;
}
.modal-row:last-child { border-bottom: none; }
.modal-label { color: var(--text2); }
.modal-val { font-weight: 500; text-align: right; }
.modal-progress { margin-top: 10px; }
.modal-progress-bar {
  height: 6px; background: var(--border); border-radius: 3px;
  overflow: hidden; margin-top: 4px;
}
.modal-progress-fill { height: 100%; border-radius: 3px; }
.badge {
  font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; white-space: nowrap;
}
.badge.overdue { background: #fef2f2; color: var(--red); }
.badge.active { background: #eff6ff; color: var(--accent); }
.badge.done { background: #f0fdf4; color: var(--green); }
.badge.planned { background: #f8fafc; color: var(--text3); }
@media(prefers-color-scheme:dark){
  .badge.overdue { background: #3b1419; }
  .badge.active { background: #1a2240; }
  .badge.done { background: #132a1a; }
  .badge.planned { background: #1e2030; }
}

/* ── Loading ── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; color: var(--text2);
}
.loader {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Login Overlay ── */
#login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #1a1d2e 0%, #2d3150 100%);
  display: flex; align-items: center; justify-content: center;
}
#login-box {
  background: #fff; border-radius: 16px; padding: 40px 44px;
  width: 360px; max-width: 92vw;
  box-shadow: 0 24px 80px rgba(0,0,0,.5); text-align: center;
}
#login-box h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
#login-box p { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
#login-box input {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; outline: none;
  transition: border .15s; margin-bottom: 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
#login-box input:focus { border-color: var(--accent); }
#login-box button {
  width: 100%; padding: 11px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .15s;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
#login-box button:hover { background: #3b5de7; }
#login-err { color: #ef4444; font-size: 12px; margin-top: -6px; margin-bottom: 10px; min-height: 16px; }
#login-logo { width: 132px; height: auto; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }

/* ── Responsive ── */
@media(max-width:380px){
  #login-box { padding: 28px 24px; }
  #login-logo img { width: 90px !important; }
  #login-box h2 { font-size: 18px !important; }
}
</style>

<script>
var tasks = [];
var FILTER_COLOR = '#6366f1'; // nur lila Aufgaben anzeigen (null = alle)
var today = new Date();
var todayStr = today.toISOString().slice(0,10);
var currentMonday = getMonday(today);
var DN = ['MO','DI','MI','DO','FR','SA','SO'];
var MN = ['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function getMonday(d) {
  var dt = new Date(d); var day = dt.getDay();
  dt.setDate(dt.getDate() + ((day===0?-6:1)-day));
  dt.setHours(0,0,0,0); return dt;
}
function getISOWeek(d) {
  var dt = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var dayNum = dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-dayNum);
  var ys = new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-ys)/86400000)+1)/7);
}
function pad(n){ return n<10?'0'+n:''+n; }
function toStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function addDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d){
  if(!d) return '';
  if(typeof d==='string'){ var p=d.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
  return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
}
function fmtDateShort(d){ return d.getDate()+'. '+MN[d.getMonth()]; }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function getStatus(t) {
  if(t.done||(t.progress||0)>=100) return 'done';
  if(!t.done&&t.end<todayStr&&(t.progress||0)<100) return 'overdue';
  if((t.progress||0)>0&&t.start<=todayStr) return 'active';
  if(t.start>todayStr) return 'planned';
  return 'active';
}
function statusLabel(s){
  return {done:'Erledigt',overdue:'Uberfällig',active:'In Arbeit',planned:'Geplant'}[s]||s;
}

function changeWeek(dir){ currentMonday=addDays(currentMonday,dir*7); render(); }
function goToday(){ currentMonday=getMonday(today); render(); }

// ── Does task overlap with a given day range (Mon-Sun)? ──
function taskInWeek(t, monStr, sunStr) {
  if(t.hidden) return false;
  // Urlaub: check urlaubPeriods, not the overall start/end
  if(t.type==='urlaub' && t.urlaubPeriods && t.urlaubPeriods.length){
    for(var i=0;i<t.urlaubPeriods.length;i++){
      var up=t.urlaubPeriods[i];
      if(up.start<=sunStr && up.end>=monStr) return true;
    }
    return false;
  }
  if(t.start<=sunStr && t.end>=monStr) return true;
  if(t.extraPeriods&&t.extraPeriods.length){
    for(var i=0;i<t.extraPeriods.length;i++){
      var ep=t.extraPeriods[i];
      if(ep.start<=sunStr && ep.end>=monStr) return true;
    }
  }
  return false;
}

// ── Calculate bar position (left%, width%) within the 7-day grid ──
function barPos(startStr, endStr, monStr, sunStr) {
  var monD = new Date(monStr), sunD = new Date(sunStr);
  var s = new Date(startStr), e = new Date(endStr);
  // Clamp to week boundaries
  if(s < monD) s = monD;
  if(e > sunD) e = sunD;
  var dayStart = Math.round((s - monD) / 86400000);
  var dayEnd = Math.round((e - monD) / 86400000);
  var left = (dayStart / 7) * 100;
  var width = ((dayEnd - dayStart + 1) / 7) * 100;
  return { left: left, width: width };
}

function render() {
  var kw = getISOWeek(currentMonday);
  var sunday = addDays(currentMonday, 6);
  var monStr = toStr(currentMonday), sunStr = toStr(sunday);

  document.getElementById('kwLabel').textContent = 'KW ' + kw;
  document.getElementById('kwDates').textContent = fmtDateShort(currentMonday) + ' – ' + fmtDateShort(sunday) + ' ' + currentMonday.getFullYear();

  var todayMonday = getMonday(today);
  document.getElementById('btnToday').className = 'btn-today' + (currentMonday.getTime()===todayMonday.getTime()?' hidden':'');

  // Day header
  var dhHtml = '';
  for(var d=0;d<7;d++){
    var dd = addDays(currentMonday, d);
    var dStr = toStr(dd);
    var cls = 'day-hdr-cell';
    if(dStr===todayStr) cls += ' today';
    else if(d>=5) cls += ' weekend';
    dhHtml += '<div class="'+cls+'"><div class="dn">'+DN[d]+'</div><div class="dd">'+dd.getDate()+'</div></div>';
  }
  document.getElementById('dayHeaderRow').innerHTML = dhHtml;

  // Build ordered rows matching Gantt file order (root tasks in array order, children nested)
  var childrenOf = {};
  tasks.forEach(function(t){
    if(t.parentId){
      if(!childrenOf[t.parentId]) childrenOf[t.parentId] = [];
      childrenOf[t.parentId].push(t);
    }
  });

  function addChildren(parentId, depth, list){
    var ch = childrenOf[parentId];
    if(!ch) return;
    ch.forEach(function(t){
      if(t.hidden) return;
      if(t.type==='urlaub'||t.type==='meeting') return;
      var matches = !FILTER_COLOR || t.color === FILTER_COLOR;
      if(matches && taskInWeek(t, monStr, sunStr)){
        list.push({task:t, depth:0});
      }
      // Always recurse to find matching descendants
      addChildren(t.id, depth+1, list);
    });
  }

  // Helper: does a task have any matching descendants in this week? (recursive)
  function hasMatchingDescendant(parentId){
    var ch = childrenOf[parentId];
    if(!ch) return false;
    return ch.some(function(c){
      if(c.hidden) return false;
      if(!FILTER_COLOR || c.color === FILTER_COLOR){
        if(taskInWeek(c, monStr, sunStr)) return true;
      }
      return hasMatchingDescendant(c.id);
    });
  }

  var orderedNormal = [];
  // Root tasks in original array order
  tasks.forEach(function(t){
    if(t.parentId) return;
    if(t.hidden) return;
    if(t.type==='urlaub'||t.type==='meeting') return;
    var rootMatches = !FILTER_COLOR || t.color === FILTER_COLOR;
    if(rootMatches && taskInWeek(t, monStr, sunStr)){
      orderedNormal.push({task:t, depth:0});
    }
    // Always recurse to find matching descendants
    addChildren(t.id, 1, orderedNormal);
  });

  var vacations = tasks.filter(function(t){ return t.type==='urlaub'&&!t.hidden&&taskInWeek(t,monStr,sunStr); });
  var meetings = tasks.filter(function(t){ return t.type==='meeting'&&!t.hidden&&taskInWeek(t,monStr,sunStr); });

  var html = '';

  // ── Normal tasks ──
  if(orderedNormal.length){
    html += '<div class="section-row"><span class="section-icon">&#9654;</span>Aufgaben<span class="section-count">'+orderedNormal.length+'</span></div>';
    orderedNormal.forEach(function(item){ html += renderRow(item.task, monStr, sunStr, item.depth > 0); });
  }

  // ── Vacations ──
  if(vacations.length){
    html += '<div class="section-row"><span class="section-icon">&#127958;</span>Urlaub<span class="section-count">'+vacations.length+'</span></div>';
    vacations.forEach(function(t){ html += renderRow(t, monStr, sunStr, false); });
  }

  // ── Meetings ──
  if(meetings.length){
    html += '<div class="section-row"><span class="section-icon">&#128197;</span>Meetings<span class="section-count">'+meetings.length+'</span></div>';
    meetings.forEach(function(t){ html += renderRow(t, monStr, sunStr, false); });
  }

  if(!html) html = '<div style="text-align:center;padding:40px 20px;color:var(--text3);font-size:13px">Keine Aufgaben in dieser Woche.</div>';

  document.getElementById('ganttBody').innerHTML = html;
  document.getElementById('ganttBody').style.display = 'block';
  document.getElementById('loadingArea').style.display = 'none';

}

function renderRow(t, monStr, sunStr, isChild) {
  var s = getStatus(t);
  var color = '#60a5fa'; // hellblau für alle Balken
  var pct = t.progress || 0;
  var name = esc(t.name || '');
  var childCls = isChild ? ' child-row' : '';

  var labelCls = isChild ? ' child-label' : '';
  var childCls2 = isChild ? ' child-row' : '';

  var h = '<div class="gantt-group" onclick="showDetail('+t.id+')">';

  // Label row
  h += '<div class="gantt-label-row'+labelCls+'">'+name+'</div>';

  // Bar row
  h += '<div class="gantt-row'+childCls2+'">';
  h += '<div class="day-cells">';
  for(var d=0;d<7;d++){
    var dStr = toStr(addDays(new Date(monStr),d));
    var cls = 'day-cell';
    if(dStr===todayStr) cls += ' today-col';
    else if(d>=5) cls += ' weekend-col';
    h += '<div class="'+cls+'"></div>';
  }

  // Bars
  var doneCls = s==='done'?' done-bar':'';
  if(t.type==='urlaub' && t.urlaubPeriods && t.urlaubPeriods.length){
    t.urlaubPeriods.forEach(function(up){
      if(up.start<=sunStr && up.end>=monStr){
        var ubp = barPos(up.start, up.end, monStr, sunStr);
        h += '<div class="task-bar" style="left:'+ubp.left+'%;width:'+ubp.width+'%">';
        h += '<div class="bar-bg" style="background:'+color+'"></div>';
        h += '</div>';
      }
    });
  } else {
    var bp = barPos(t.start, t.end, monStr, sunStr);
    h += '<div class="task-bar'+doneCls+'" style="left:'+bp.left+'%;width:'+bp.width+'%">';
    h += '<div class="bar-bg" style="background:'+color+'">';
    if(pct>0 && pct<100){
      h += '<div class="bar-progress" style="width:'+pct+'%"></div>';
    }
    h += '</div>';
    h += '</div>';

    if(t.extraPeriods&&t.extraPeriods.length){
      t.extraPeriods.forEach(function(ep){
        if(ep.start<=sunStr && ep.end>=monStr){
          var ebp = barPos(ep.start, ep.end, monStr, sunStr);
          h += '<div class="task-bar-extra" style="left:'+ebp.left+'%;width:'+ebp.width+'%;background:'+color+'"></div>';
        }
      });
    }
  }

  h += '</div>'; // day-cells
  h += '</div>'; // gantt-row
  h += '</div>'; // gantt-group
  return h;
}

// ── Detail Modal ──
function showDetail(id) {
  var t=null;
  for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){t=tasks[i];break;}}
  if(!t) return;
  var s=getStatus(t), pct=t.progress||0, color=t.color||'#4f6ef7';
  var dur=Math.round((new Date(t.end)-new Date(t.start))/86400000);

  var h='<h2>'+esc(t.name||'')+'</h2>';
  h+='<div class="modal-row"><span class="modal-label">Status</span><span class="modal-val"><span class="badge '+s+'">'+statusLabel(s)+'</span></span></div>';
  h+='<div class="modal-row"><span class="modal-label">Beginn</span><span class="modal-val">'+fmtDate(t.start)+'</span></div>';
  h+='<div class="modal-row"><span class="modal-label">Ende</span><span class="modal-val">'+fmtDate(t.end)+'</span></div>';
  h+='<div class="modal-row"><span class="modal-label">Dauer</span><span class="modal-val">'+dur+' Tage</span></div>';

  if(t.milestone){
    h+='<div class="modal-row"><span class="modal-label">&#9873; Meilenstein</span><span class="modal-val" style="color:var(--amber)">'+fmtDate(t.milestone)+'</span></div>';
  }
  if(t.extraPeriods&&t.extraPeriods.length){
    h+='<div class="modal-row"><span class="modal-label">Zusatzzeiträume</span><span class="modal-val">'+
      t.extraPeriods.map(function(ep){return fmtDate(ep.start)+' – '+fmtDate(ep.end);}).join('<br>')+
      '</span></div>';
  }
  if(t.parentId){
    var parent=null;
    for(var i=0;i<tasks.length;i++){if(tasks[i].id===t.parentId){parent=tasks[i];break;}}
    if(parent) h+='<div class="modal-row"><span class="modal-label">Hauptaufgabe</span><span class="modal-val">'+esc(parent.name||'')+'</span></div>';
  }
  var children=tasks.filter(function(c){return c.parentId===t.id&&!c.hidden;});
  if(children.length){
    h+='<div class="modal-row" style="flex-direction:column"><span class="modal-label" style="margin-bottom:6px">Unteraufgaben ('+children.length+')</span>';
    children.forEach(function(c){
      var cs=getStatus(c);
      h+='<div style="display:flex;align-items:center;gap:6px;padding:3px 0">'
        +'<div style="width:3px;height:16px;border-radius:1px;background:'+(c.color||color)+'"></div>'
        +'<span style="flex:1;font-size:12px">'+esc(c.name||'')+'</span>'
        +'<span class="badge '+cs+'" style="font-size:9px">'+statusLabel(cs)+'</span></div>';
    });
    h+='</div>';
  }
  if(t.type!=='urlaub'&&t.type!=='meeting'){
    h+='<div class="modal-progress"><div style="display:flex;justify-content:space-between;font-size:12px">'
      +'<span>Fortschritt</span><span style="font-weight:600">'+pct+'%</span></div>'
      +'<div class="modal-progress-bar"><div class="modal-progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
  }
  document.getElementById('modalContent').innerHTML=h;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }

// ── Swipe ──
(function(){
  var sx=0,sy=0,sw=false;
  var el=document.getElementById('ganttBody');
  el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;sw=true;},{passive:true});
  el.addEventListener('touchend',function(e){
    if(!sw)return; sw=false;
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5) changeWeek(dx<0?1:-1);
  },{passive:true});
})();

// ── Firebase ──
function markConnected(){ document.getElementById('statusDot').className='status-dot connected'; }
function markError(){ document.getElementById('statusDot').className='status-dot error'; }
function doRefresh(){
  GANTT_DOC.get().then(function(doc){
    if(doc.exists){var d=doc.data();if(d.tasks&&d.tasks.length){tasks=d.tasks;render();}}
    markConnected();
  }).catch(function(){markError();});
}

// ── BENUTZERVERWALTUNG ──
var USERS = [
  {name:'Admin', hash:btoa('admin123'), role:'admin'},
  {name:'User',  hash:btoa('user123'),  role:'user'}
];
var currentUser = null;
var _firebaseStarted = false;

function simpleHash(str){
  try{return btoa(unescape(encodeURIComponent(str)));}catch(e){return btoa(str);}
}

function doLogin(){
  var pw=document.getElementById('login-pw').value;
  var name=document.getElementById('login-name').value.trim();
  if(!pw||!name){
    var err=document.getElementById('login-err');
    err.textContent='Bitte Name und Passwort eingeben.';
    setTimeout(function(){err.textContent='';},3000);
    return;
  }
  var h=simpleHash(pw);
  var user=USERS.find(function(u){return u.name.toLowerCase()===name.toLowerCase()&&u.hash===h;});
  if(user){
    currentUser=user.name;
    try{localStorage.setItem('taskview_auth_session',JSON.stringify({user:user.name,role:user.role,ts:Date.now()}));}catch(e){}
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('mainHeader').style.display='';
    document.getElementById('login-pw').value='';
    document.getElementById('login-name').value='';
    firebaseStart();
  } else {
    var err=document.getElementById('login-err');
    err.textContent='Name oder Passwort falsch.';
    document.getElementById('login-pw').select();
    setTimeout(function(){err.textContent='';},3000);
  }
}

function firebaseStart(){
  if(_firebaseStarted) return;
  _firebaseStarted=true;

  GANTT_DOC.get().then(function(doc){
    if(doc.exists){var d=doc.data();if(d.tasks&&d.tasks.length) tasks=d.tasks;}
    render(); markConnected();
  }).catch(function(e){
    console.error('Firebase error:',e);
    document.getElementById('loadingArea').innerHTML='<div style="color:var(--red);font-size:14px;text-align:center;padding:20px">&#x26A0; Verbindung fehlgeschlagen<br><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;border-radius:8px;border:1px solid var(--red);background:none;color:var(--red);cursor:pointer">Erneut versuchen</button></div>';
    markError();
  });

  GANTT_DOC.onSnapshot(function(doc){
    if(!doc.exists||doc.metadata.hasPendingWrites)return;
    var d=doc.data();if(!d||!d.tasks)return;
    tasks=d.tasks; render(); markConnected();
  },function(err){console.warn('Snapshot error:',err);});
}

function showLogin(){
  document.getElementById('login-overlay').style.display='flex';
  setTimeout(function(){var el=document.getElementById('login-name');if(el)el.focus();},100);
}

function doLogout(){
  currentUser=null;
  _firebaseStarted=false;
  try{localStorage.removeItem('taskview_auth_session');}catch(e){}
  document.getElementById('mainHeader').style.display='none';
  document.getElementById('login-overlay').style.display='flex';
  document.getElementById('login-pw').value='';
  document.getElementById('login-name').value='';
  setTimeout(function(){var el=document.getElementById('login-name');if(el)el.focus();},100);
}

// ── Initialisierung: USERS aus Firebase laden, dann Login zeigen ──
(function(){
  var loginShown=false;
  function tryShowLogin(){
    if(loginShown) return;
    loginShown=true;
    // Auto-Login aus Session prüfen
    try{
      var s=JSON.parse(localStorage.getItem('taskview_auth_session'));
      if(s&&s.user&&(Date.now()-s.ts)<86400000){
        var user=USERS.find(function(u){return u.name.toLowerCase()===s.user.toLowerCase();});
        if(user){
          currentUser=user.name;
          document.getElementById('mainHeader').style.display='';
          firebaseStart();
          return;
        }
      }
    }catch(e){}
    showLogin();
  }
  var fallback=setTimeout(tryShowLogin,3000);
  GANTT_DOC.get().then(function(doc){
    clearTimeout(fallback);
    if(doc.exists){
      var d=doc.data();
      if(d.users&&d.users.length){ USERS=d.users; }
    }
    tryShowLogin();
  }).catch(function(){
    clearTimeout(fallback);
    tryShowLogin();
  });
})();
