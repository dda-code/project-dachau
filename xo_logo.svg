<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" preserveAspectRatio="xMidYMid meet">
  <!-- XO logo, schwarz, mit registered-Symbol oben rechts. Designed nach der angefügten Vorlage. -->
  <g fill="#1a1a1a">
    <!-- X -->
    <polygon points="20,20 90,20 165,105 240,20 305,20 200,135 305,220 240,220 165,150 90,220 20,220 130,100"/>
    <!-- O ring -->
    <path d="M 360 20
             a 100 100 0 1 0 0.01 0 z
             M 360 60
             a 60 60 0 1 1 -0.01 0 z" fill-rule="evenodd"/>
    <!-- Registered ® top-right of O -->
    <circle cx="450" cy="40" r="14" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <text x="450" y="46" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">R</text>
  </g>
</svg>
