<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--bg2:#ffffff;--surface:#f0f1f5;--surface2:#e4e6ef;
  --border:#dde0ea;--text:#1a1d2e;--text2:#5a607a;--text3:#9ba3c0;
  --accent:#4f6ef7;--accent2:#3a58e0;--red:#ef4444;
  --we:#f0f1f8;--hol:#fef3c7;--today:#fee2e2;
  --bar:#4f6ef7;--bar-progress:#3a58e0;
  --summary:#1a1d2e;--milestone:#1a1d2e;
  --critical:#ef4444;--critical-progress:#b91c1c;
  --baseline:#9ba3c0;
  --row-h:26px;--hdr-h:22px;
  --font:'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:12px}

#login-overlay{position:fixed;inset:0;background:rgba(26,29,46,.85);z-index:1000;display:flex;align-items:center;justify-content:center}
#login-box{background:var(--bg2);padding:32px;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.3);width:340px}
#login-box h2{margin:0 0 16px;font-size:18px}
#login-box p{margin:0 0 16px;color:var(--text2);font-size:13px}
#login-box input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-size:14px;margin-bottom:8px}
#login-box button{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer;font-weight:600}
#login-box button:hover{background:var(--accent2)}
#login-err{color:var(--red);font-size:12px;min-height:18px;margin-bottom:4px}

#topbar{background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.toprow{display:flex;align-items:center;padding:5px 12px;gap:6px;flex-wrap:wrap;min-height:34px}
.toprow.r1{border-bottom:1px solid var(--border)}
h1{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px;cursor:pointer;font-family:var(--font);white-space:nowrap;font-weight:500}
.btn:hover{background:var(--surface2);border-color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn.danger{color:var(--red);border-color:#fca5a5;background:#fff}
.btn.danger:hover{background:#fee2e2}
.btn:disabled{opacity:.4;cursor:not-allowed}
.sep{width:1px;height:20px;background:var(--border)}
.zsel{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.zsel button{padding:4px 8px;background:var(--surface);border:none;border-right:1px solid var(--border);font-size:11px;cursor:pointer;color:var(--text);font-family:var(--font)}
.zsel button:last-child{border-right:none}
.zsel button.active{background:var(--accent);color:#fff}
.zsel button:hover:not(.active){background:var(--surface2)}
label.chk{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);cursor:pointer;user-select:none}
#status-bar{margin-left:auto;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px}
#save-ind{display:flex;align-items:center;gap:4px}
#save-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}

#wrap{flex:1;display:flex;overflow:hidden;background:var(--bg)}
#grid-pane{display:flex;flex-direction:column;width:560px;flex-shrink:0;background:var(--bg2);overflow:hidden;border-right:1px solid var(--border)}
#splitter{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .1s}
#splitter:hover,#splitter.drag{background:var(--accent)}
#chart-pane{flex:1;display:flex;overflow:hidden;background:var(--bg)}
#chart-scroll{flex:1;overflow:auto;position:relative}

#grid-header{display:flex;background:var(--surface);border-bottom:2px solid var(--border);height:calc(var(--hdr-h) * 2);align-items:stretch;flex-shrink:0}
.gh{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:4px 6px;border-right:1px solid var(--border);text-align:center;line-height:1.2;display:flex;align-items:center;justify-content:center}
.gh.name{text-align:left;justify-content:flex-start}
#grid-body{flex:1;overflow-y:auto;overflow-x:hidden}
.grow{display:flex;height:var(--row-h);border-bottom:1px solid var(--border);align-items:stretch;cursor:default;position:relative}
.grow:hover{background:var(--surface)}
.grow.selected{background:#e0e7ff !important}
.grow.summary{font-weight:700;background:#fafafc}
.grow.summary:hover{background:var(--surface)}
.grow.critical .gc.name .tname-text{color:var(--critical)}
.gc{padding:0 6px;border-right:1px solid var(--border);font-size:11px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;color:var(--text);position:relative}
.gc.id{justify-content:center;color:var(--text3);font-weight:600;font-size:10px}
.gc.wbs{justify-content:center;color:var(--text2);font-size:10px}
.gc.ind{justify-content:center;font-size:13px}
.gc.name{flex:1;cursor:text}
.gc.num{justify-content:flex-end;font-variant-numeric:tabular-nums;cursor:text}
.gc.date{justify-content:flex-start;color:var(--text2);font-variant-numeric:tabular-nums;cursor:text}
.gc.pct{justify-content:flex-end;font-variant-numeric:tabular-nums;cursor:text}
.gc.pred{font-family:Consolas,monospace;font-size:10px;color:var(--text2);cursor:text}
.gc.editing{padding:0}
.gc.editing input{width:100%;height:100%;border:2px solid var(--accent);background:#fff;padding:0 4px;font-size:11px;font-family:var(--font);outline:none;border-radius:2px}
.gc.editing input.num,.gc.editing input.pct{text-align:right}
.gc.editing input.pred{font-family:Consolas,monospace;font-size:10px}
.collapse{cursor:pointer;color:var(--text3);font-size:9px;width:14px;text-align:center;flex-shrink:0;user-select:none;display:inline-flex;align-items:center;justify-content:center}
.collapse:hover{color:var(--accent)}
.tname-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

#chart-header{position:sticky;top:0;z-index:10;background:var(--bg2);border-bottom:2px solid var(--border);height:calc(var(--hdr-h) * 2);display:flex;flex-direction:column}
.chdr1,.chdr2{display:flex;height:var(--hdr-h);flex-shrink:0}
.chdr1{border-bottom:1px solid var(--border)}
.chc{border-right:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface);text-transform:uppercase;letter-spacing:.3px;overflow:hidden;white-space:nowrap}
.chc.minor{background:var(--bg2);font-weight:500;color:var(--text3);text-transform:none}
.chc.we{background:var(--we);color:var(--text3)}
.chc.hol{background:var(--hol);color:#92400e}
.chc.tod{background:var(--today);color:var(--critical);font-weight:700}

#chart-inner{position:relative}
.cgrid{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0}
.cgrid .vl{position:absolute;top:0;bottom:0;width:1px;background:var(--border)}
.cgrid .vl.today{background:var(--critical);width:2px;z-index:2}
.cgrid .vlbg{position:absolute;top:0;bottom:0}
.cgrid .vlbg.we{background:var(--we)}
.cgrid .vlbg.hol{background:var(--hol)}
.crow{position:absolute;left:0;right:0;border-bottom:1px solid var(--border);z-index:1}
.crow.selected{background:rgba(79,110,247,.06)}

.bar{position:absolute;height:14px;top:50%;margin-top:-7px;border-radius:2px;cursor:grab;z-index:2}
.bar.task{background:var(--bar);border:1px solid var(--bar-progress);overflow:hidden}
.bar.task .prog{position:absolute;left:0;top:0;bottom:0;background:var(--bar-progress)}
.bar.task.critical{background:var(--critical);border-color:var(--critical-progress)}
.bar.task.critical .prog{background:var(--critical-progress)}
.bar.summary{height:8px;margin-top:-4px;background:var(--summary);border-radius:0;cursor:default}
.bar.summary::before{content:'';position:absolute;left:0;top:100%;width:0;height:0;border-style:solid;border-width:5px 4px 0 0;border-color:var(--summary) transparent transparent}
.bar.summary::after{content:'';position:absolute;right:0;top:100%;width:0;height:0;border-style:solid;border-width:5px 0 0 4px;border-color:var(--summary) transparent transparent}
.bar.milestone{width:14px;height:14px;background:var(--milestone);transform:rotate(45deg);border-radius:0;cursor:grab;margin-top:-7px}
.bar.milestone.critical{background:var(--critical)}
.bar-lbl{position:absolute;top:50%;margin-top:-7px;height:14px;line-height:14px;font-size:10px;color:var(--text);white-space:nowrap;pointer-events:none;z-index:2}
.bar.baseline{height:4px;top:50%;margin-top:9px;background:var(--baseline);border-radius:1px;z-index:1;cursor:default}
.bar-resize{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;z-index:3}
.bar-resize.l{left:-3px}
.bar-resize.r{right:-3px}

#dep-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:3;overflow:visible}
.dep-line{stroke:#5a607a;stroke-width:1.2;fill:none}
.dep-arrow{fill:#5a607a}
.dep-line.critical{stroke:var(--critical);stroke-width:1.6}
.dep-arrow.critical{fill:var(--critical)}

#ctxmenu{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:1000;padding:4px 0;min-width:200px;display:none}
#ctxmenu.show{display:block}
.ctxitem{padding:6px 14px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:8px}
.ctxitem:hover{background:var(--surface)}
.ctxitem.danger{color:var(--red)}
.ctxsep{height:1px;background:var(--border);margin:4px 0}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1d2e;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:2000;opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}

body.readonly .btn:not(.viewonly){opacity:.5;pointer-events:none}
body.readonly .gc{cursor:default !important}
</style>
</head>

<script>
// === CONSTANTS ===
const PROJECT_START = new Date(2026,0,1);
const PROJECT_END   = new Date(2028,11,31);
const MONTHS_DE      = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const MONTHS_DE_FULL = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const DAYS_DE = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const EMAIL_DOMAIN = '@xolution.com';

const ZOOM = {
  day:     { ppd: 32,  hdr1:'month', hdr2:'day' },
  week:    { ppd: 14,  hdr1:'month', hdr2:'week' },
  month:   { ppd: 4,   hdr1:'year',  hdr2:'month' },
  quarter: { ppd: 1.5, hdr1:'year',  hdr2:'quarter' }
};

// === HOLIDAYS (Bayern) ===
function easterDate(y){
  const a=y%19,b=Math.floor(y/100),c=y%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31),dy=(h+l-7*m+114)%31+1;
  return new Date(y,mo-1,dy);
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){
  if(!d) return '';
  if(typeof d==='string') return d.slice(0,10);
  const m=d.getMonth()+1,dy=d.getDate();
  return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(dy<10?'0':'')+dy;
}
function parseDate(s){
  if(!s) return null;
  if(s instanceof Date) return new Date(s);
  return new Date(s.slice(0,10)+'T00:00:00');
}
const HOLIDAYS = {};
for (const y of [2025,2026,2027,2028,2029]) {
  const e = easterDate(y);
  const add = (d,n) => { const k = fmtDate(d); HOLIDAYS[k] = HOLIDAYS[k] ? HOLIDAYS[k]+' / '+n : n; };
  add(new Date(y,0,1),'Neujahr');
  add(new Date(y,0,6),'Hl. 3 Könige');
  add(new Date(y,4,1),'Tag der Arbeit');
  add(new Date(y,7,15),'Mariä Himmelfahrt');
  add(new Date(y,9,3),'Tag der Einheit');
  add(new Date(y,10,1),'Allerheiligen');
  add(new Date(y,11,25),'1. Weihnachtstag');
  add(new Date(y,11,26),'2. Weihnachtstag');
  add(addDays(e,-2),'Karfreitag');
  add(addDays(e,1),'Ostermontag');
  add(addDays(e,39),'Christi Himmelfahrt');
  add(addDays(e,50),'Pfingstmontag');
  add(addDays(e,60),'Fronleichnam');
}
function isWorkDay(d){
  const dow = d.getDay();
  if (dow===0 || dow===6) return false;
  return !HOLIDAYS[fmtDate(d)];
}
function addWorkDays(date, n){
  const d = new Date(date);
  if (n === 0) { while (!isWorkDay(d)) d.setDate(d.getDate()+1); return d; }
  const step = n > 0 ? 1 : -1;
  let rem = Math.abs(n);
  while (rem > 0) { d.setDate(d.getDate()+step); if (isWorkDay(d)) rem--; }
  return d;
}
function workDaysBetween(a, b){
  if (!a || !b) return 0;
  const sa = new Date(a), sb = new Date(b);
  if (sa > sb) return 0;
  let n = 0;
  const d = new Date(sa);
  while (d <= sb) { if (isWorkDay(d)) n++; d.setDate(d.getDate()+1); }
  return n;
}
function finishFromStart(start, duration){
  const d = new Date(start);
  while (!isWorkDay(d)) d.setDate(d.getDate()+1);
  if (duration <= 0) return d;
  let cnt = 1;
  while (cnt < duration) { d.setDate(d.getDate()+1); if (isWorkDay(d)) cnt++; }
  return d;
}
function fmtDateDE(s){
  if(!s) return '';
  const d = parseDate(s); if(!d) return '';
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getFullYear()).slice(2);
}
function parseDateDE(s){
  if(!s) return null;
  s = s.trim();
  let m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
  if (m){ let y = parseInt(m[3]); if (y < 100) y += 2000; return new Date(y, parseInt(m[2])-1, parseInt(m[1])); }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  return null;
}

// === STATE ===
let tasks = [];
let nextId = 1;
let zoom = 'week';
let selectedRowId = null;
let editingCell = null;
let _saveTimer = null;
let _remoteUpdate = false;
let currentUser = null;
let currentRole = 'viewer';

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
function setStatus(color, text){
  document.getElementById('save-dot').style.background = color;
  document.getElementById('save-txt').textContent = text;
}
function _canEdit(){ return currentRole === 'admin' || currentRole === 'manager'; }

// === HIERARCHY ===
function isSummary(t){
  const idx = tasks.indexOf(t);
  if (idx < 0 || idx === tasks.length-1) return false;
  return tasks[idx+1].outlineLevel > t.outlineLevel;
}
function getDescendants(t){
  const idx = tasks.indexOf(t);
  const out = [];
  for (let i = idx+1; i < tasks.length; i++){
    if (tasks[i].outlineLevel <= t.outlineLevel) break;
    out.push(tasks[i]);
  }
  return out;
}
function isMilestone(t){ return (t.duration||0) <= 0 && !isSummary(t); }
function buildWBS(){
  const counters = [];
  for (const t of tasks){
    const lvl = t.outlineLevel || 0;
    while (counters.length <= lvl) counters.push(0);
    counters[lvl]++;
    for (let i = lvl+1; i < counters.length; i++) counters[i] = 0;
    t.wbs = counters.slice(0, lvl+1).join('.');
  }
}

// === PREDECESSORS ===
function parsePredecessors(s){
  if (!s) return [];
  return s.split(/[,;]/).map(p=>p.trim()).filter(Boolean).map(p=>{
    const m = p.match(/^(\d+)\s*(FS|SS|FF|SF)?\s*([+-]\d+)?\s*d?$/i);
    if (!m) return null;
    return {id:parseInt(m[1]), type:(m[2]||'FS').toUpperCase(), lag:parseInt(m[3]||'0')};
  }).filter(Boolean);
}
function fmtPredecessors(arr){
  if (!arr || !arr.length) return '';
  return arr.map(p=>{
    let s = String(p.id);
    if (p.type && p.type !== 'FS') s += p.type;
    if (p.lag) s += (p.lag>0?'+':'')+p.lag+'d';
    return s;
  }).join(',');
}

// Map id -> visible index (set after each render)
function findTask(id){ return tasks.find(t => t.id === id); }

// === SCHEDULE (forward) ===
function scheduleTasks(){
  for (let iter = 0; iter < tasks.length + 5; iter++){
    let changed = false;
    for (const t of tasks){
      if (isSummary(t)) continue;
      if (!t.predecessors || !t.predecessors.length) continue;
      let earliest = null;
      for (const p of t.predecessors){
        const pred = findTask(p.id);
        if (!pred || !pred.start || !pred.finish) continue;
        const ps = parseDate(pred.start);
        const pf = parseDate(pred.finish);
        const lag = p.lag || 0;
        const td = Math.max(t.duration||1, 1);
        let c;
        switch (p.type) {
          case 'SS': c = addWorkDays(ps, lag); break;
          case 'FF': c = addWorkDays(pf, 1+lag - td); break;
          case 'SF': c = addWorkDays(ps, lag - td); break;
          case 'FS': default: c = addWorkDays(pf, 1+lag);
        }
        if (!earliest || c > earliest) earliest = c;
      }
      if (earliest){
        const cur = parseDate(t.start);
        if (!cur || cur < earliest){
          const oldStart = t.start;
          t.start = fmtDate(earliest);
          t.finish = fmtDate(finishFromStart(earliest, t.duration||0));
          if (oldStart !== t.start) changed = true;
        }
      }
    }
    if (!changed) break;
  }
  // Summary rollup
  for (const t of tasks){
    if (!isSummary(t)) continue;
    const desc = getDescendants(t).filter(x=>!isSummary(x));
    if (!desc.length) continue;
    const starts = desc.map(x=>parseDate(x.start)).filter(Boolean);
    const fins   = desc.map(x=>parseDate(x.finish)).filter(Boolean);
    if (!starts.length || !fins.length) continue;
    const ms = new Date(Math.min(...starts.map(d=>d.getTime())));
    const mf = new Date(Math.max(...fins.map(d=>d.getTime())));
    t.start = fmtDate(ms);
    t.finish = fmtDate(mf);
    t.duration = workDaysBetween(ms, mf);
    let totalDur = 0, weightedPct = 0;
    for (const x of desc){
      const d = Math.max(x.duration||0, 0.001);
      totalDur += d;
      weightedPct += d * (x.percent||0);
    }
    t.percent = totalDur > 0 ? Math.round(weightedPct/totalDur) : 0;
  }
  computeCritical();
}

// === CRITICAL PATH (backward pass) ===
function computeCritical(){
  for (const t of tasks){ t.critical = false; t.LS = null; t.LF = null; }
  const leafs = tasks.filter(t => !isSummary(t) && t.finish);
  if (!leafs.length) return;
  const projFin = new Date(Math.max(...leafs.map(t=>parseDate(t.finish).getTime())));
  const succMap = new Map();
  for (const t of tasks){
    for (const p of (t.predecessors||[])){
      if (!succMap.has(p.id)) succMap.set(p.id, []);
      succMap.get(p.id).push({succ:t, type:p.type, lag:p.lag||0});
    }
  }
  for (let iter = 0; iter < tasks.length + 5; iter++){
    let changed = false;
    for (let i = tasks.length-1; i >= 0; i--){
      const t = tasks[i];
      if (isSummary(t) || !t.start) continue;
      const td = Math.max(t.duration||1, 1);
      const succs = succMap.get(t.id) || [];
      let LF = null;
      if (!succs.length){
        LF = projFin;
      } else {
        let allReady = true;
        for (const s of succs){
          if (!s.succ.LS) { allReady = false; break; }
          const sLS = parseDate(s.succ.LS);
          const sLF = parseDate(s.succ.LF);
          let c;
          switch (s.type){
            case 'SS': c = addWorkDays(sLS, -s.lag + (td-1)); break;
            case 'FF': c = addWorkDays(sLF, -s.lag); break;
            case 'SF': c = addWorkDays(sLF, -s.lag + (td-1)); break;
            case 'FS': default: c = addWorkDays(sLS, -1 - s.lag);
          }
          if (!LF || c < LF) LF = c;
        }
        if (!allReady) continue;
      }
      if (LF){
        const newLF = fmtDate(LF);
        if (t.LF !== newLF){
          t.LF = newLF;
          t.LS = fmtDate(addWorkDays(LF, -Math.max(td-1, 0)));
          changed = true;
        }
      }
    }
    if (!changed) break;
  }
  for (const t of tasks){
    if (isSummary(t) || !t.LF || !t.finish) continue;
    if (t.LF === t.finish) t.critical = true;
  }
}

// === RENDER ===
function ppd(){ return ZOOM[zoom].ppd; }
function chartWidth(){
  const days = Math.ceil((PROJECT_END - PROJECT_START)/86400000) + 1;
  return days * ppd();
}
function dateToX(s){
  const d = parseDate(s);
  if (!d) return 0;
  const days = Math.round((d - PROJECT_START)/86400000);
  return days * ppd();
}

function render(){
  buildWBS();
  scheduleTasks();
  renderGrid();
  renderChartHeader();
  renderChartBody();
  renderDependencies();
  updateRoleUI();
}

function updateRoleUI(){
  const rb = document.getElementById('role-badge');
  if (rb) rb.textContent = currentUser ? (currentRole + ' · ' + (currentUser.email||'')) : '—';
  document.body.classList.toggle('readonly', currentUser && !_canEdit());
}

function getVisibleTasks(){
  const hidden = new Set();
  for (const t of tasks){
    if (hidden.has(t.id)) continue;
    if (t.collapsed && isSummary(t)){
      for (const d of getDescendants(t)) hidden.add(d.id);
    }
  }
  return tasks.filter(t => !hidden.has(t.id));
}

function renderGrid(){
  const body = document.getElementById('grid-body');
  body.innerHTML = '';
  const vis = getVisibleTasks();
  const showCrit = document.getElementById('chk-critical')?.checked;
  let visIdx = 0;
  for (const t of vis){
    visIdx++;
    const row = document.createElement('div');
    row.className = 'grow';
    row.dataset.taskId = t.id;
    if (selectedRowId === t.id) row.classList.add('selected');
    if (isSummary(t)) row.classList.add('summary');
    if (t.critical && showCrit) row.classList.add('critical');
    row.addEventListener('click', () => selectRow(t.id));
    row.addEventListener('contextmenu', (e) => { e.preventDefault(); selectRow(t.id); showCtxMenu(e.clientX, e.clientY); });
    // ID
    row.appendChild(mkCell('id', String(visIdx), '40px'));
    // WBS
    row.appendChild(mkCell('wbs', t.wbs||'', '54px'));
    // Indicator
    const cInd = mkCell('ind', '', '22px');
    if (isSummary(t)) cInd.textContent = '▾';
    else if (isMilestone(t)) { cInd.textContent = '◆'; cInd.style.color = t.critical && showCrit ? 'var(--critical)' : '#1a1d2e'; }
    row.appendChild(cInd);
    // Name
    const cName = document.createElement('div');
    cName.className = 'gc name';
    cName.style.flex = '1';
    cName.style.minWidth = '140px';
    const indent = document.createElement('span');
    indent.style.cssText = 'flex-shrink:0;display:inline-block;width:'+((t.outlineLevel||0)*14)+'px';
    cName.appendChild(indent);
    if (isSummary(t)){
      const col = document.createElement('span');
      col.className = 'collapse';
      col.textContent = t.collapsed ? '▸' : '▾';
      col.addEventListener('click', (e) => { e.stopPropagation(); t.collapsed = !t.collapsed; render(); saveState(); });
      cName.appendChild(col);
    } else {
      const sp = document.createElement('span');
      sp.style.cssText = 'flex-shrink:0;display:inline-block;width:14px';
      cName.appendChild(sp);
    }
    const txt = document.createElement('span');
    txt.className = 'tname-text';
    txt.textContent = t.name || '';
    cName.appendChild(txt);
    bindCellEdit(cName, t, 'name');
    row.appendChild(cName);
    // Duration
    const cDur = mkCell('num', isMilestone(t) ? '0 T' : ((t.duration||0)+' T'), '54px');
    bindCellEdit(cDur, t, 'duration');
    row.appendChild(cDur);
    // Start
    const cS = mkCell('date', fmtDateDE(t.start), '78px');
    bindCellEdit(cS, t, 'start');
    row.appendChild(cS);
    // Finish
    const cF = mkCell('date', fmtDateDE(t.finish), '78px');
    bindCellEdit(cF, t, 'finish');
    row.appendChild(cF);
    // Predecessors
    const cP = mkCell('pred', fmtPredecessors(t.predecessors||[]), '82px');
    bindCellEdit(cP, t, 'predecessors');
    row.appendChild(cP);
    // Percent
    const cPct = mkCell('pct', (t.percent||0)+'%', '46px');
    bindCellEdit(cPct, t, 'percent');
    row.appendChild(cPct);
    body.appendChild(row);
  }
}
function mkCell(cls, text, width){
  const c = document.createElement('div');
  c.className = 'gc ' + cls;
  if (width) c.style.width = width;
  c.textContent = text || '';
  return c;
}

// === Chart Header ===
function renderChartHeader(){
  const ph = ZOOM[zoom];
  const h1 = document.querySelector('.chdr1');
  const h2 = document.querySelector('.chdr2');
  h1.innerHTML = ''; h2.innerHTML = '';
  document.getElementById('chart-header').style.width = chartWidth() + 'px';
  // Top header
  if (ph.hdr1 === 'year'){
    let y = PROJECT_START.getFullYear();
    const endY = PROJECT_END.getFullYear();
    for (; y <= endY; y++){
      const s = new Date(y,0,1) < PROJECT_START ? PROJECT_START : new Date(y,0,1);
      const e = new Date(y,11,31) > PROJECT_END ? PROJECT_END : new Date(y,11,31);
      const w = (Math.round((e-s)/86400000)+1) * ph.ppd;
      const c = document.createElement('div');
      c.className = 'chc';
      c.style.width = w + 'px';
      c.textContent = y;
      h1.appendChild(c);
    }
  } else {
    const d = new Date(PROJECT_START.getFullYear(), PROJECT_START.getMonth(), 1);
    while (d <= PROJECT_END){
      const s = d < PROJECT_START ? PROJECT_START : new Date(d);
      const next = new Date(d.getFullYear(), d.getMonth()+1, 1);
      const e = next > PROJECT_END ? new Date(PROJECT_END) : addDays(next, -1);
      const w = (Math.round((e-s)/86400000)+1) * ph.ppd;
      const c = document.createElement('div');
      c.className = 'chc';
      c.style.width = w + 'px';
      c.textContent = MONTHS_DE_FULL[d.getMonth()] + ' ' + d.getFullYear();
      h1.appendChild(c);
      d.setTime(next.getTime());
    }
  }
  // Bottom header
  const today = fmtDate(new Date());
  if (ph.hdr2 === 'day'){
    const d = new Date(PROJECT_START);
    while (d <= PROJECT_END){
      const c = document.createElement('div');
      c.className = 'chc minor';
      const isT = fmtDate(d) === today;
      const we = d.getDay()===0 || d.getDay()===6;
      const hol = HOLIDAYS[fmtDate(d)];
      if (isT) c.classList.add('tod');
      else if (hol) c.classList.add('hol');
      else if (we) c.classList.add('we');
      c.style.width = ph.ppd + 'px';
      c.innerHTML = '<div style="line-height:1.1;text-align:center"><div style="font-size:8px;color:var(--text3)">'+DAYS_DE[d.getDay()].charAt(0)+'</div><div style="font-size:10px;font-weight:600">'+d.getDate()+'</div></div>';
      if (hol) c.title = hol;
      h2.appendChild(c);
      d.setDate(d.getDate()+1);
    }
  } else if (ph.hdr2 === 'week'){
    const d = new Date(PROJECT_START);
    while (d.getDay() !== 1) d.setDate(d.getDate()-1);
    while (d <= PROJECT_END){
      const s = d < PROJECT_START ? PROJECT_START : new Date(d);
      const end = addDays(d, 6);
      const e = end > PROJECT_END ? PROJECT_END : end;
      const w = (Math.round((e-s)/86400000)+1) * ph.ppd;
      const c = document.createElement('div');
      c.className = 'chc minor';
      c.style.width = w + 'px';
      const kw = isoWeek(d);
      c.textContent = 'KW' + kw;
      c.title = 'Kalenderwoche ' + kw + ' (ab ' + fmtDateDE(fmtDate(s)) + ')';
      h2.appendChild(c);
      d.setDate(d.getDate()+7);
    }
  } else if (ph.hdr2 === 'month'){
    const d = new Date(PROJECT_START.getFullYear(), PROJECT_START.getMonth(), 1);
    while (d <= PROJECT_END){
      const s = d < PROJECT_START ? PROJECT_START : new Date(d);
      const next = new Date(d.getFullYear(), d.getMonth()+1, 1);
      const e = next > PROJECT_END ? new Date(PROJECT_END) : addDays(next, -1);
      const w = (Math.round((e-s)/86400000)+1) * ph.ppd;
      const c = document.createElement('div');
      c.className = 'chc minor';
      c.style.width = w + 'px';
      c.textContent = MONTHS_DE[d.getMonth()];
      h2.appendChild(c);
      d.setTime(next.getTime());
    }
  } else if (ph.hdr2 === 'quarter'){
    const d = new Date(PROJECT_START.getFullYear(), Math.floor(PROJECT_START.getMonth()/3)*3, 1);
    while (d <= PROJECT_END){
      const s = d < PROJECT_START ? PROJECT_START : new Date(d);
      const next = new Date(d.getFullYear(), d.getMonth()+3, 1);
      const e = next > PROJECT_END ? new Date(PROJECT_END) : addDays(next, -1);
      const w = (Math.round((e-s)/86400000)+1) * ph.ppd;
      const c = document.createElement('div');
      c.className = 'chc minor';
      c.style.width = w + 'px';
      c.textContent = 'Q' + (Math.floor(d.getMonth()/3)+1);
      h2.appendChild(c);
      d.setTime(next.getTime());
    }
  }
}
function isoWeek(d){
  const date = new Date(d.getTime());
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - (date.getDay()+6)%7);
  const week1 = new Date(date.getFullYear(),0,4);
  return 1 + Math.round(((date-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
}

        const m = document.createElement('div');
        m.className = 'bar milestone';
        if (t.critical && showCrit) m.classList.add('critical');
        m.style.left = (x1 - 7) + 'px';
        m.dataset.taskId = t.id;
        row.appendChild(m);
        attachMilestoneDrag(m, t);
        const lbl = document.createElement('div');
        lbl.className = 'bar-lbl';
        lbl.style.left = (x1 + 12) + 'px';
        lbl.textContent = (t.name||'') + '  ' + fmtDateDE(t.start);
        row.appendChild(lbl);
      } else if (isSummary(t)){
        const b = document.createElement('div');
        b.className = 'bar summary';
        b.style.left = x1 + 'px';

      } else {
        const b = document.createElement('div');
        b.className = 'bar task';
        if (t.critical && showCrit) b.classList.add('critical');

        b.dataset.taskId = t.id;

// === Dependencies ===
function renderDependencies(){
  const svg = document.getElementById('dep-svg');
  svg.innerHTML = '<defs>'+
    '<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5a607a"/></marker>'+
    '<marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/></marker>'+
  '</defs>';
  const rowH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--row-h'));
  const vis = getVisibleTasks();
  const visIds = vis.map(t => t.id);
  const idxOf = new Map(visIds.map((id,i) => [id, i]));
  const yOf = (id) => idxOf.get(id) * rowH + rowH/2;
  const xStart = (t) => dateToX(t.start);
  const xEnd = (t) => dateToX(t.finish) + ppd();
  const showCrit = document.getElementById('chk-critical')?.checked;
  for (const t of vis){
    if (!t.predecessors) continue;
    for (const p of t.predecessors){
      const pred = findTask(p.id);
      if (!pred || !idxOf.has(pred.id)) continue;
      let x1, y1, x2, y2;
      switch (p.type){
        case 'SS': x1 = xStart(pred); y1 = yOf(pred.id); x2 = xStart(t); y2 = yOf(t.id); break;
        case 'FF': x1 = xEnd(pred); y1 = yOf(pred.id); x2 = xEnd(t); y2 = yOf(t.id); break;
        case 'SF': x1 = xStart(pred); y1 = yOf(pred.id); x2 = xEnd(t); y2 = yOf(t.id); break;
        case 'FS': default: x1 = xEnd(pred); y1 = yOf(pred.id); x2 = xStart(t); y2 = yOf(t.id);
      }
      const crit = showCrit && pred.critical && t.critical;
      svg.appendChild(mkDepPath(x1, y1, x2, y2, p.type, crit));
    }
  }
}
function mkDepPath(x1, y1, x2, y2, type, crit){
  let d;
  if (type === 'FS' || type === 'SF' || !type){
    if (x2 >= x1 + 12){
      const mx = x2 - 6;
      d = 'M'+x1+','+y1+' L'+mx+','+y1+' L'+mx+','+y2+' L'+x2+','+y2;
    } else {
      const mx1 = x1 + 8, mx2 = x2 - 8, my = (y1+y2)/2;
      d = 'M'+x1+','+y1+' L'+mx1+','+y1+' L'+mx1+','+my+' L'+mx2+','+my+' L'+mx2+','+y2+' L'+x2+','+y2;
    }
  } else if (type === 'SS'){
    const lx = Math.min(x1, x2) - 8;
    d = 'M'+x1+','+y1+' L'+lx+','+y1+' L'+lx+','+y2+' L'+x2+','+y2;
  } else if (type === 'FF'){
    const rx = Math.max(x1, x2) + 8;
    d = 'M'+x1+','+y1+' L'+rx+','+y1+' L'+rx+','+y2+' L'+x2+','+y2;
  }
  const el = document.createElementNS('http://www.w3.org/2000/svg','path');
  el.setAttribute('d', d);
  el.setAttribute('class', 'dep-line' + (crit?' critical':''));
  el.setAttribute('marker-end', crit ? 'url(#arrC)' : 'url(#arr)');
  return el;
}

function selectRow(id){
  selectedRowId = id;

// === CELL EDITING ===
function bindCellEdit(cell, task, field){
  if (isSummary(task) && (field === 'start' || field === 'finish' || field === 'duration' || field === 'predecessors')) {
    cell.style.cursor = 'default';
    return;
  }
  cell.addEventListener('dblclick', (e) => {
    e.stopPropagation();
    if (!_canEdit()) { toast('Nur Manager/Admin können bearbeiten.'); return; }
    startEdit(cell, task, field);
  });
}
function startEdit(cell, task, field){
  if (editingCell) return;
  editingCell = { taskId: task.id, field };
  let val = '';
  if (field === 'name') val = task.name || '';
  else if (field === 'duration') val = String(task.duration || 0);
  else if (field === 'start') val = fmtDateDE(task.start);
  else if (field === 'finish') val = fmtDateDE(task.finish);
  else if (field === 'predecessors') val = fmtPredecessors(task.predecessors||[]);
  else if (field === 'percent') val = String(task.percent || 0);
  cell.classList.add('editing');
  const orig = cell.innerHTML;
  cell.innerHTML = '';
  const inp = document.createElement('input');
  inp.value = val;
  if (field === 'duration' || field === 'percent') inp.className = 'num';
  if (field === 'predecessors') inp.className = 'pred';
  cell.appendChild(inp);
  inp.focus();
  inp.select();
  const finish = (commit, nextDir) => {
    if (commit) applyEdit(task, field, inp.value);
    cell.classList.remove('editing');
    editingCell = null;
    saveState();
    render();
    if (nextDir) setTimeout(() => moveEdit(task.id, field, nextDir), 0);
  };
  inp.addEventListener('blur', () => finish(true, null));
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Escape'){ inp.value = val; finish(false, null); }
    else if (e.key === 'Enter'){ e.preventDefault(); finish(true, 'down'); }
    else if (e.key === 'Tab'){ e.preventDefault(); finish(true, e.shiftKey ? 'left' : 'right'); }
  });
}
function moveEdit(taskId, field, dir){
  const fields = ['name','duration','start','finish','predecessors','percent'];
  const fi = fields.indexOf(field);
  const vis = getVisibleTasks();
  const ti = vis.findIndex(t => t.id === taskId);
  if (ti < 0) return;
  let nf = fi, nt = ti;
  if (dir === 'right') nf = Math.min(fields.length-1, fi+1);
  else if (dir === 'left') nf = Math.max(0, fi-1);
  else if (dir === 'down') nt = Math.min(vis.length-1, ti+1);
  else if (dir === 'up') nt = Math.max(0, ti-1);
  const targetT = vis[nt];
  const targetField = fields[nf];
  if (!targetT) return;
  selectedRowId = targetT.id;
  // Find the cell
  const row = document.querySelector('[data-task-id="'+targetT.id+'"]');
  if (!row) return;
  const cells = row.querySelectorAll('.gc');
  const map = { name:3, duration:4, start:5, finish:6, predecessors:7, percent:8 };
  const cell = cells[map[targetField]];
  if (cell && _canEdit() && !cell.classList.contains('editing')){
    // Skip for summary fields that aren't editable
    if (isSummary(targetT) && targetField !== 'name' && targetField !== 'percent') return;
    startEdit(cell, targetT, targetField);
  }
}
function applyEdit(task, field, val){
  if (field === 'name'){ task.name = val.trim(); }
  else if (field === 'duration'){
    let n = parseInt(String(val).replace(/[^0-9-]/g,'')) || 0;
    if (n < 0) n = 0;
    task.duration = n;
    if (task.start) task.finish = fmtDate(finishFromStart(parseDate(task.start), n));
  }
  else if (field === 'start'){
    const d = parseDateDE(val);
    if (d){
      task.start = fmtDate(d);
      task.finish = fmtDate(finishFromStart(d, task.duration||0));
    }
  }
  else if (field === 'finish'){
    const d = parseDateDE(val);
    if (d && task.start){
      const sd = parseDate(task.start);
      if (d >= sd){
        task.duration = workDaysBetween(sd, d);
        task.finish = fmtDate(d);
      }
    }
  }
  else if (field === 'predecessors'){
    task.predecessors = parsePredecessors(val);
  }
  else if (field === 'percent'){
    let n = parseInt(String(val).replace(/[^0-9]/g,'')) || 0;
    if (n < 0) n = 0; if (n > 100) n = 100;
    task.percent = n;
  }
}

// === TASK OPS ===
function addTask(){
  if (!_canEdit()) { toast('Keine Berechtigung'); return; }
  const idx = selectedRowId ? tasks.findIndex(t=>t.id===selectedRowId) : tasks.length-1;
  const sel = idx >= 0 ? tasks[idx] : null;
  const level = sel ? sel.outlineLevel : 0;
  const today = fmtDate(new Date());
  const startD = (today >= fmtDate(PROJECT_START)) ? today : fmtDate(PROJECT_START);
  const newT = {
    id: nextId++,
    name: 'Neue Aufgabe',
    outlineLevel: level,
    predecessors: [],
    percent: 0,
    start: startD,
    finish: fmtDate(finishFromStart(parseDate(startD), 1)),
    duration: 1
  };
  let insertAt = tasks.length;
  if (sel){
    insertAt = idx + 1;
    if (isSummary(sel)) insertAt = idx + 1 + getDescendants(sel).length;
  }
  tasks.splice(insertAt, 0, newT);
  selectedRowId = newT.id;
  render();
  saveState();
}
function addMilestone(){
  if (!_canEdit()) { toast('Keine Berechtigung'); return; }
  addTask();
  const t = findTask(selectedRowId);
  if (t){
    t.duration = 0;
    t.name = 'Meilenstein';
    t.finish = t.start;
    render();
    saveState();
  }
}
function deleteTask(){
  if (!_canEdit()) return;
  if (!selectedRowId) { toast('Keine Aufgabe ausgewählt'); return; }
  const idx = tasks.findIndex(t=>t.id===selectedRowId);
  if (idx < 0) return;
  const t = tasks[idx];
  if (!confirm('Aufgabe "'+t.name+'"'+(getDescendants(t).length?' und alle Unteraufgaben':'')+' löschen?')) return;
  const removed = new Set([t.id, ...getDescendants(t).map(d=>d.id)]);
  tasks = tasks.filter(x => !removed.has(x.id));
  for (const x of tasks){
    if (x.predecessors) x.predecessors = x.predecessors.filter(p => !removed.has(p.id));
  }
  selectedRowId = null;
  render();
  saveState();
}
function indent(){
  if (!_canEdit() || !selectedRowId) return;
  const idx = tasks.findIndex(t=>t.id===selectedRowId);
  if (idx <= 0) return;
  const t = tasks[idx];
  const prev = tasks[idx-1];
  if (t.outlineLevel > prev.outlineLevel) return;
  t.outlineLevel = (t.outlineLevel||0) + 1;
  for (const d of getDescendants(t)) d.outlineLevel = (d.outlineLevel||0) + 1;
  render();
  saveState();
}
function outdent(){
  if (!_canEdit() || !selectedRowId) return;
  const idx = tasks.findIndex(t=>t.id===selectedRowId);
  if (idx < 0) return;
  const t = tasks[idx];
  if ((t.outlineLevel||0) <= 0) return;
  t.outlineLevel--;
  for (const d of getDescendants(t)) d.outlineLevel--;
  render();
  saveState();
}
function moveTask(dir){
  if (!_canEdit() || !selectedRowId) return;
  const idx = tasks.findIndex(t=>t.id===selectedRowId);
  if (idx < 0) return;
  const t = tasks[idx];
  const block = [t, ...getDescendants(t)];
  const blockLen = block.length;
  if (dir < 0){
    if (idx === 0) return;
    let prevIdx = -1;
    for (let i = idx-1; i >= 0; i--){
      if (tasks[i].outlineLevel === t.outlineLevel){ prevIdx = i; break; }
      if (tasks[i].outlineLevel < t.outlineLevel) break;
    }
    if (prevIdx < 0) return;
    const removed = tasks.splice(idx, blockLen);
    tasks.splice(prevIdx, 0, ...removed);
  } else {
    const afterIdx = idx + blockLen;
    if (afterIdx >= tasks.length) return;
    if (tasks[afterIdx].outlineLevel < t.outlineLevel) return;
    const nextT = tasks[afterIdx];
    const nextBlockLen = 1 + getDescendants(nextT).length;
    const removed = tasks.splice(idx, blockLen);
    tasks.splice(idx + nextBlockLen, 0, ...removed);
  }
  render();
  saveState();
}
function saveBaseline(){
  if (!_canEdit()) return;
  if (!confirm('Basisplan setzen? Aktuelle Start/Ende werden als Basisplan gespeichert.')) return;
  for (const t of tasks){
    t.baseline = { start: t.start, finish: t.finish, duration: t.duration };
  }
  document.getElementById('chk-baseline').checked = true;
  render();
  saveState();
  toast('Basisplan gespeichert');
}

// === EXPORT/IMPORT ===
function exportJSON(){
  const data = { tasks, nextId, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'project-dachau-gantt-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importJSON(){
  if (!_canEdit()) { toast('Keine Berechtigung'); return; }
  document.getElementById('file-input').click();
}
document.getElementById('file-input').addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const rd = new FileReader();
  rd.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.tasks)) throw new Error('Ungültiges Format');
      if (!confirm('Alle aktuellen Aufgaben durch '+data.tasks.length+' importierte ersetzen?')) return;
      tasks = data.tasks;
      nextId = data.nextId || (Math.max(...tasks.map(t=>t.id))+1);
      render();
      saveState();
      toast('Import erfolgreich');
    } catch (err){
      alert('Import fehlgeschlagen: ' + err.message);
    }
  };
  rd.readAsText(f);
  e.target.value = '';
});

// === BAR DRAG / RESIZE ===
function attachBarDrag(bar, task){
  bar.addEventListener('mousedown', (e) => {
    if (!_canEdit()) return;
    if (e.target.classList.contains('bar-resize')) return;
    e.preventDefault(); e.stopPropagation();
    selectRow(task.id);
    const startX = e.clientX;
    const origStart = parseDate(task.start);
    const dur = task.duration || 1;
    document.body.style.cursor = 'grabbing';
    const onMove = (ev) => {
      const dxDays = Math.round((ev.clientX - startX) / ppd());
      if (dxDays === 0) return;
      const newStart = addDays(origStart, dxDays);
      task.start = fmtDate(newStart);
      task.finish = fmtDate(finishFromStart(newStart, dur));
      render();
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      saveState();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}
function attachMilestoneDrag(bar, task){
  bar.addEventListener('mousedown', (e) => {
    if (!_canEdit()) return;
    e.preventDefault(); e.stopPropagation();
    selectRow(task.id);
    const startX = e.clientX;
    const origStart = parseDate(task.start);
    document.body.style.cursor = 'grabbing';
    const onMove = (ev) => {
      const dxDays = Math.round((ev.clientX - startX) / ppd());
      if (dxDays === 0) return;
      const newStart = addDays(origStart, dxDays);
      task.start = fmtDate(newStart);
      task.finish = task.start;
      render();
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      saveState();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}
function attachBarResize(bar, task){
  for (const h of bar.querySelectorAll('.bar-resize')){
    h.addEventListener('mousedown', (e) => {
      if (!_canEdit()) return;
      e.preventDefault(); e.stopPropagation();
      selectRow(task.id);
      const side = h.dataset.side;
      const startX = e.clientX;
      const origDur = Math.max(task.duration || 1, 1);
      const origStart = parseDate(task.start);
      const origFin = parseDate(task.finish);
      document.body.style.cursor = 'ew-resize';
      const onMove = (ev) => {
        const dxDays = Math.round((ev.clientX - startX) / ppd());
        if (side === 'r'){
          const newDur = Math.max(1, origDur + dxDays);
          task.duration = newDur;
          task.finish = fmtDate(finishFromStart(origStart, newDur));
        } else {
          const newStart = addDays(origStart, dxDays);
          if (newStart <= origFin){
            const nd = workDaysBetween(newStart, origFin);
            if (nd >= 1){
              task.start = fmtDate(newStart);
              task.duration = nd;
            }
          }
        }
        render();
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.style.cursor = '';
        saveState();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
}

  zoom = z;

function scrollToToday(){
  const today = new Date();
  if (today < PROJECT_START || today > PROJECT_END) return;

  const cs = document.getElementById('chart-scroll');

// === CONTEXT MENU ===
function showCtxMenu(x, y){
  const cm = document.getElementById('ctxmenu');
  cm.innerHTML = '';
  const items = [
    {label:'+ Aufgabe', cb: addTask},
    {label:'◆ Meilenstein', cb: addMilestone},
    {sep:true},
    {label:'→ Einrücken (Alt+Shift+→)', cb: indent},
    {label:'← Ausrücken (Alt+Shift+←)', cb: outdent},
    {sep:true},
    {label:'↑ Nach oben (Strg+↑)', cb: ()=>moveTask(-1)},
    {label:'↓ Nach unten (Strg+↓)', cb: ()=>moveTask(1)},
    {sep:true},
    {label:'🗑 Löschen (Entf)', cb: deleteTask, danger:true}
  ];
  for (const it of items){
    if (it.sep){ const s = document.createElement('div'); s.className = 'ctxsep'; cm.appendChild(s); continue; }
    const d = document.createElement('div');
    d.className = 'ctxitem' + (it.danger?' danger':'');
    d.textContent = it.label;
    d.addEventListener('click', () => { cm.classList.remove('show'); it.cb(); });
    cm.appendChild(d);
  }
  cm.style.left = Math.min(x, window.innerWidth - 220) + 'px';
  cm.style.top = Math.min(y, window.innerHeight - 320) + 'px';
  cm.classList.add('show');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('#ctxmenu')) document.getElementById('ctxmenu').classList.remove('show');
});

// === KEYBOARD ===
document.addEventListener('keydown', (e) => {
  if (editingCell) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.altKey && e.shiftKey && e.key === 'ArrowRight'){ e.preventDefault(); indent(); }
  else if (e.altKey && e.shiftKey && e.key === 'ArrowLeft'){ e.preventDefault(); outdent(); }
  else if (e.ctrlKey && e.key === 'ArrowUp'){ e.preventDefault(); moveTask(-1); }
  else if (e.ctrlKey && e.key === 'ArrowDown'){ e.preventDefault(); moveTask(1); }
  else if (e.key === 'Delete' && selectedRowId){ deleteTask(); }
  else if (e.key === 'Insert'){ e.preventDefault(); addTask(); }
  else if (e.key === 'ArrowDown' && selectedRowId){
    e.preventDefault();
    const vis = getVisibleTasks();
    const i = vis.findIndex(t => t.id === selectedRowId);
    if (i >= 0 && i < vis.length-1) selectRow(vis[i+1].id);
  } else if (e.key === 'ArrowUp' && selectedRowId){
    e.preventDefault();
    const vis = getVisibleTasks();
    const i = vis.findIndex(t => t.id === selectedRowId);
    if (i > 0) selectRow(vis[i-1].id);
  } else if (e.key === 'F2' && selectedRowId){
    e.preventDefault();
    const t = findTask(selectedRowId);
    if (t && _canEdit()){
      const row = document.querySelector('[data-task-id="'+t.id+'"]');
      if (row){ const cells = row.querySelectorAll('.gc'); startEdit(cells[3], t, 'name'); }
    }
  }
});

// === SPLITTER ===
(function(){
  const sp = document.getElementById('splitter');
  const gp = document.getElementById('grid-pane');
  let dragging = false, startX = 0, startW = 0;
  sp.addEventListener('mousedown', (e) => {
    dragging = true; startX = e.clientX; startW = gp.offsetWidth;
    sp.classList.add('drag');
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const w = Math.max(240, Math.min(900, startW + (e.clientX - startX)));
    gp.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (dragging){ dragging = false; sp.classList.remove('drag'); }
  });
})();

// === SCROLL SYNC ===
(function(){
  const cs = document.getElementById('chart-scroll');
  const gb = document.getElementById('grid-body');
  let lock = false;
  cs.addEventListener('scroll', () => {
    if (lock) return;
    lock = true;
    if (gb.scrollTop !== cs.scrollTop) gb.scrollTop = cs.scrollTop;
    lock = false;
  });
  gb.addEventListener('scroll', () => {
    if (lock) return;
    lock = true;
    if (cs.scrollTop !== gb.scrollTop) cs.scrollTop = gb.scrollTop;
    lock = false;
  });
})();

// === FIREBASE LOAD / SAVE ===
function saveState() {
  if (_remoteUpdate) return;
  if (!_canEdit()) return;
  clearTimeout(_saveTimer);
  setStatus('#a78bfa','↑ Speichert…');
  _saveTimer = setTimeout(async () => {
    try {
      await DOC.set({
        tasks: tasks,
        nextId: nextId,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: currentUser ? currentUser.email : '?'
      }, {merge:true});
    } catch(e){
      console.error('Save failed:', e);
      setStatus('#ef4444','⚠ Fehler');
    }
  }, 400);
}

let _unsubState = null;
function listenState() {
  if (_unsubState) _unsubState();
  _unsubState = DOC.onSnapshot(snap => {
    if (!snap.exists) {
      if (_canEdit()){
        tasks = seedDemoTasks();
        nextId = tasks.length + 10;
        render();
        saveState();
      } else {
        tasks = [];
        render();
      }
      return;
    }
    const d = snap.data();
    _remoteUpdate = true;
    tasks = Array.isArray(d.tasks) ? d.tasks : [];
    nextId = d.nextId || (tasks.length + 1);
    _remoteUpdate = false;
    render();
    setStatus('#22c55e','☁ Synchronisiert');
  }, err => {
    console.error('Listen error:', err);
    setStatus('#ef4444','⚠ Offline');
  });
}

// === AUTH ===
function toEmail(v){ v = (v||'').trim().toLowerCase(); return v.includes('@') ? v : v + EMAIL_DOMAIN; }
function doLogin(){
  const e = toEmail(document.getElementById('li-email').value);
  const pw = document.getElementById('li-pw').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!e.endsWith(EMAIL_DOMAIN)){ err.textContent = 'Nur ' + EMAIL_DOMAIN + ' Konten erlaubt'; return; }
  firebase.auth().signInWithEmailAndPassword(e, pw).catch(ex => {
    err.textContent = (ex.code === 'auth/wrong-password' || ex.code === 'auth/invalid-credential') ? 'Falsche Zugangsdaten' : (ex.message || 'Login fehlgeschlagen');
  });
}
function doLogout(){ firebase.auth().signOut(); }

async function fetchRole(uid){
  for (let i = 0; i < 3; i++){
    try {
      const doc = await db.collection('users').doc(uid).get();
      if (doc.exists){
        const d = doc.data() || {};
        return d.role || d.currentRole || 'viewer';
      }
    } catch(e){ console.warn('fetchRole try', i, e.code || e.message); }
    await new Promise(r => setTimeout(r, 400 * (i+1)));
  }
  return 'viewer';
}

firebase.auth().onAuthStateChanged(async (u) => {
  if (!u){
    currentUser = null; currentRole = 'viewer';
    document.getElementById('login-overlay').style.display = 'flex';
    if (_unsubState){ _unsubState(); _unsubState = null; }
    tasks = []; render();
    return;
  }
  currentUser = u;
  document.getElementById('login-overlay').style.display = 'none';
  setStatus('#60a5fa','⟳ Lade Rolle…');
  currentRole = await fetchRole(u.uid);
  updateRoleUI();
  setStatus('#60a5fa','⟳ Lade Daten…');
  listenState();
});
